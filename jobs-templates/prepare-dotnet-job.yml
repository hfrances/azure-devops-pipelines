parameters:
  - name: jobName
    type: string
    default: '' # Prepare
  - name: displayName
    type: string
    default: Prepare
  - name: prefix
    type: string
    default: ''
  - name: suffix
    type: string
    default: ''
  - name: solutionPattern
    type: string
    default: '$(BuildParameters.Solution)'
  - name: workingDirectory
    type: string
    default: ''
  - name: includedPatterns
    type: object
    default: []
  - name: excludedPatterns
    type: object
    default: []
  - name: publishChangeDetection
    type: boolean
    default: true
  - name: publishExtraMode
    type: string
    default: none
    values:
      - none
      - aspnet
  - name: innerRepository
    type: string
    default: 'azure-pipelines-repo'

jobs:
  - job: ${{ coalesce(parameters.jobName, replace(replace(replace(format('{0}{1}_{2}', 'Prepare', replace(replace(replace(replace(replace(coalesce(parameters.prefix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_'), replace(replace(replace(replace(replace(coalesce(parameters.suffix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_')), '~_~', ''), '~_', '_'), '_~', '') ) }}
    displayName: ${{ parameters.displayName }}
    steps:
      - checkout: self
        fetchDepth: 0
        persistCredentials: true

      - template: ../scripts-templates/create-drop-folder.yml@${{ parameters.innerRepository }}

      - template: ../scripts-templates/get-main-project-dotnet.yml@${{ parameters.innerRepository }}
        parameters:
          solutionPattern: '${{ parameters.solutionPattern }}'
          workingDirectory: '$(Build.SourcesDirectory)/${{ parameters.workingDirectory }}'

      - template: ../scripts-templates/get-project-properties-dotnet.yml@${{ parameters.innerRepository }}

      - template: ../scripts-templates/detect-publishable-changes-dotnet.yml@${{ parameters.innerRepository }}
        parameters:
          taskName: DetectPublishableChanges
          definitionName: ''
          enabled: ${{ parameters.publishChangeDetection }}
          workingDirectory: '${{ parameters.workingDirectory }}'
          solutionPath: '$(Solution.FullName)'
          tagPrefix: ${{ parameters.prefix }}
          tagSuffix: ${{ parameters.suffix }}
          includedPatterns: ${{ parameters.includedPatterns }}
          excludedPatterns: ${{ parameters.excludedPatterns }}
          publishExtraMode: ${{ parameters.publishExtraMode }}

      - task: PowerShell@2
        name: ExportPreparation
        displayName: Export preparation outputs
        inputs:
          pwsh: true
          targetType: inline
          script: |
            function export-output([string]$name, [string]$value) {
              if ($null -eq $value) { $value = '' }
              Write-Output "##vso[task.setvariable variable=$name;isOutput=true]$value"
            }

            Write-Output "SolutionFullName: $(Solution.FullName)"
            export-output 'SolutionFullName' '$(Solution.FullName)'
            Write-Output "SolutionNugetFeedToUse: $(Solution.NugetFeedToUse)"
            export-output 'SolutionNugetFeedToUse' '$(Solution.NugetFeedToUse)'
            Write-Output "SolutionNugetConfig: $(Solution.NugetConfig)"
            export-output 'SolutionNugetConfig' '$(Solution.NugetConfig)'
            Write-Output ""
            Write-Output "MainProjectFullName: $(MainProject.FullName)"
            export-output 'MainProjectFullName' '$(MainProject.FullName)'
            Write-Output "MainProjectVersion: $(MainProject.Version)"
            export-output 'MainProjectVersion' '$(MainProject.Version)'
            Write-Output "MainProjectPackageName: $(MainProject.PackageName)"
            export-output 'MainProjectPackageName' '$(MainProject.PackageName)'
            Write-Output "MainProjectDescription: $(MainProject.Description)"
            export-output 'MainProjectDescription' '$(MainProject.Description)'
            Write-Output ""
            Write-Output "BuildParameters.HasAffectedBuildProjects: $(BuildParameters.HasAffectedBuildProjects)"
            export-output 'BuildParameters.HasAffectedBuildProjects' '$(BuildParameters.HasAffectedBuildProjects)'
            Write-Output "BuildParameters.HasAffectedPublishProjects: $(BuildParameters.HasAffectedPublishProjects)"
            export-output 'BuildParameters.HasAffectedPublishProjects' '$(BuildParameters.HasAffectedPublishProjects)'
            
      - template: ../scripts-templates/export-variable-list.yml@${{ parameters.innerRepository }}

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: drop-prepare'
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)/drop'
          artifactName: 'drop-prepare'
        condition: succeededOrFailed()
