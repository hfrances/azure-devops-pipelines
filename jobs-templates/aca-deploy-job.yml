parameters:
  # Name of the job generated by this template.
  - name: jobName
    type: string
    default: '' # DeployToACA
  # Display name of the job generated by this template.
  - name: displayName
    type: string
    default: 'Deploy to ACA'
  # Optional prefix token appended to the default base when jobName is omitted.
  - name: prefix
    type: string
    default: ''
  # Optional canonical suffix token appended to the default base when jobName is omitted.
  - name: suffix
    type: string
    default: ''
  # Azure service connection used by all Azure CLI tasks.
  - name: azureServiceConnection
    type: string
  # Resource group that contains the Container App, the identity, and the CAE.
  - name: resourceGroup
    type: string
  # Name of the user-assigned managed identity used for ACR access.
  - name: identityName
    type: string
  # Name of the Azure Container Registry without the `.azurecr.io` suffix.
  - name: acrName
    type: string
  # Image repository inside ACR.
  - name: imageRepository
    type: string
  # Image tag to deploy.
  - name: imageTag
    type: string
  # Indicates whether this template should manage the Container Apps Environment.
  # - true: Creates or validates the CAE according to the requested configuration.
  # - false: Requires the CAE to already exist.
  - name: caeManaged
    type: boolean
    default: false
  # Name of the target Container Apps Environment.
  - name: caeName
    type: string
  # Location of the CAE when `caeManaged=true`.
  - name: caeLocation
    type: string
    default: ''
  # Name of the target Azure Container App.
  - name: acaName
    type: string
  # Ingress type of the Container App.
  # - internal: Reachable only from inside the environment network.
  # - external: Reachable externally.
  - name: acaIngressType
    type: string
    default: 'external'
  # Target port exposed by the application.
  - name: acaTargetPort
    type: string
    default: '80'
  # CPU allocation for the Container App.
  - name: acaCpu
    type: string
    default: '0.5'
  # Memory allocation for the Container App.
  - name: acaMemory
    type: string
    default: '1.0Gi'
  # Minimum replica count.
  - name: acaMinReplicas
    type: string
    default: '0'
  # Maximum replica count.
  - name: acaMaxReplicas
    type: string
    default: '1'
  # Optional environment variables in `NAME=value` format.
  - name: envVars
    type: object
    default: []
  # Indicates whether the managed CAE must be private and attached to a delegated subnet.
  # - true: Requires `resourceGroupVNet`, `vnetName`, and `subnetName`.
  # - false: Uses public mode when `caeManaged=true`.
  - name: useSubnet
    type: boolean
    default: false
  # Resource group of the VNet used in private mode.
  - name: resourceGroupVNet
    type: string
    default: ''
  # Name of the VNet used in private mode.
  - name: vnetName
    type: string
    default: ''
  # Name of the subnet used in private mode.
  - name: subnetName
    type: string
    default: ''
  # Optional job dependencies.
  - name: dependsOn
    type: object
    default: []
  # Optional job-level variables.
  - name: variables
    type: object
    default: {}
  # Optional job condition. If empty, no explicit condition is applied.
  - name: condition
    type: string
    default: ''jobs:
- job: ${{ coalesce(parameters.jobName, replace(replace(replace(format('{0}{1}_{2}', 'DeployToACA', replace(replace(replace(replace(replace(coalesce(parameters.prefix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_'), replace(replace(replace(replace(replace(coalesce(parameters.suffix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_')), '~_~', ''), '~_', '_'), '_~', '') ) }}
  displayName: ${{ parameters.displayName }}
  ${{ if gt(length(parameters.dependsOn), 0) }}:
    dependsOn: ${{ parameters.dependsOn }}
  ${{ if ne(parameters.condition, '') }}:
    condition: ${{ parameters.condition }}
  ${{ if gt(length(parameters.variables), 0) }}:
    variables:
      ${{ each pair in parameters.variables }}:
        ${{ pair.key }}: ${{ pair.value }}
  steps:
  - checkout: none

  - task: AzureCLI@2
    displayName: 'Prepare Azure CLI'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      visibleAzLogin: false
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "Preparing Azure CLI for Container Apps deployment..."
        az config set core.only_show_errors=yes
        az extension add --name containerapp --upgrade --yes --only-show-errors --output none

  - task: AzureCLI@2
    displayName: 'Validate parameters'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      visibleAzLogin: false
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "Validation input summary:"
        echo "  acaIngressType='${{ parameters.acaIngressType }}'"
        echo "  caeManaged='${{ parameters.caeManaged }}'"
        echo "  caeLocation='${{ parameters.caeLocation }}'"
        echo "  useSubnet='${{ parameters.useSubnet }}'"
        echo "  resourceGroupVNet='${{ parameters.resourceGroupVNet }}'"
        echo "  vnetName='${{ parameters.vnetName }}'"
        echo "  subnetName='${{ parameters.subnetName }}'"

        echo "Rule check: acaIngressType must be internal|external"
        case "${{ parameters.acaIngressType }}" in
          internal|external)
            echo "  OK"
            ;;
          *)
            echo "##vso[task.logissue type=error]ERROR: Invalid value for acaIngressType='${{ parameters.acaIngressType }}'. Use 'internal' or 'external'."
            exit 1
            ;;
        esac

        echo "Rule check: if caeManaged=true then caeLocation is required"
        if [ "${{ parameters.caeManaged }}" = "True" ] && [ -z "${{ parameters.caeLocation }}" ]; then
          echo "##vso[task.logissue type=error]ERROR: caeManaged=true requires caeLocation."
          exit 1
        else
          echo "  OK"
        fi

        echo "Rule check: if caeManaged=true and useSubnet=true then VNet/subnet fields are required"
        if [ "${{ parameters.caeManaged }}" = "True" ] && [ "${{ parameters.useSubnet }}" = "True" ]; then
          if [ -z "${{ parameters.resourceGroupVNet }}" ] || [ -z "${{ parameters.vnetName }}" ] || [ -z "${{ parameters.subnetName }}" ]; then
            echo "##vso[task.logissue type=error]ERROR: caeManaged=true and useSubnet=true require resourceGroupVNet, vnetName, and subnetName."
            exit 1
          else
            echo "  OK"
          fi
        else
          echo "  SKIPPED (condition not met)"
        fi

        echo "Parameter validation completed."

  - ${{ if and(eq(parameters.caeManaged, true), eq(parameters.useSubnet, true)) }}:
    - task: AzureCLI@2
      displayName: 'Validate subnet'
      inputs:
        azureSubscription: ${{ parameters.azureServiceConnection }}
        visibleAzLogin: false
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail

          echo "Retrieving subnet resource ID..."
          SUBNET_INFO_JSON=$(az network vnet subnet show \
            --resource-group "${{ parameters.resourceGroupVNet }}" \
            --vnet-name "${{ parameters.vnetName }}" \
            --name "${{ parameters.subnetName }}" \
            --query "{id:id, delegation:delegations[0].serviceName, hasIpConfigurations:ipConfigurations[0] != null, hasResourceNavigationLinks:resourceNavigationLinks[0] != null, hasServiceAssociationLinks:serviceAssociationLinks[0] != null}" -o json)

          SUBNET_ID=$(jq -r '.id // ""' <<< "$SUBNET_INFO_JSON")
          SUBNET_DELEGATION=$(jq -r '.delegation // ""' <<< "$SUBNET_INFO_JSON")
          SUBNET_HAS_IP_CONFIGS=$(jq -r '.hasIpConfigurations // false' <<< "$SUBNET_INFO_JSON")
          SUBNET_HAS_NAV_LINKS=$(jq -r '.hasResourceNavigationLinks // false' <<< "$SUBNET_INFO_JSON")
          SUBNET_HAS_SERVICE_LINKS=$(jq -r '.hasServiceAssociationLinks // false' <<< "$SUBNET_INFO_JSON")

          if [ "$SUBNET_DELEGATION" = "None" ] || [ "$SUBNET_DELEGATION" = "null" ]; then
            SUBNET_DELEGATION=""
          fi

          echo "Subnet info:"
          jq . <<< "$SUBNET_INFO_JSON"

          if [ -z "$SUBNET_DELEGATION" ]; then
            if [ "$SUBNET_HAS_IP_CONFIGS" = "true" ] || [ "$SUBNET_HAS_NAV_LINKS" = "true" ] || [ "$SUBNET_HAS_SERVICE_LINKS" = "true" ]; then
              echo "##vso[task.logissue type=error]ERROR: The subnet is not empty and will not be delegated automatically."
              echo "##vso[task.logissue type=error]ipConfigurations=$SUBNET_HAS_IP_CONFIGS, resourceNavigationLinks=$SUBNET_HAS_NAV_LINKS, serviceAssociationLinks=$SUBNET_HAS_SERVICE_LINKS"
              exit 1
            fi

            echo "The subnet is empty and has no delegation. Applying the required Azure Container Apps delegation..."
            az network vnet subnet update \
              --resource-group "${{ parameters.resourceGroupVNet }}" \
              --vnet-name "${{ parameters.vnetName }}" \
              --name "${{ parameters.subnetName }}" \
              --delegations Microsoft.App/environments \
              --only-show-errors \
              --output none
            SUBNET_DELEGATION="Microsoft.App/environments"
          fi

          if [ "$SUBNET_DELEGATION" != "Microsoft.App/environments" ]; then
            echo "##vso[task.logissue type=error]ERROR: The subnet is delegated to '$SUBNET_DELEGATION' but Azure Container Apps requires 'Microsoft.App/environments'."
            exit 1
          fi

          if [ -z "$SUBNET_ID" ]; then
            echo "##vso[task.logissue type=error]CRITICAL: Subnet not found."
            exit 1
          fi

          echo "##vso[task.setvariable variable=ACA_SUBNET_ID]$SUBNET_ID"
          echo "Subnet validated and ready for ACA."

  - task: AzureCLI@2
    displayName: 'Create or validate CAE'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      visibleAzLogin: false
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        ENV_EXISTS="false"
        if az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" >/dev/null 2>&1; then
          ENV_EXISTS="true"
        fi

        if [ "${{ parameters.caeManaged }}" = "True" ] && [ "${{ parameters.useSubnet }}" = "True" ]; then
          SUBNET_ID="${ACA_SUBNET_ID:-}"
          if [ -z "$SUBNET_ID" ]; then
            echo "##vso[task.logissue type=error]ERROR: ACA_SUBNET_ID was not received from the subnet step."
            exit 1
          fi

          if [ "$ENV_EXISTS" = "true" ]; then
            echo "The environment already exists. Its private network configuration will be validated."
          else
            echo "Creating private managed environment..."
            az containerapp env create \
              --name "${{ parameters.caeName }}" \
              --resource-group "${{ parameters.resourceGroup }}" \
              --location "${{ parameters.caeLocation }}" \
              --infrastructure-subnet-resource-id "$SUBNET_ID" \
              --internal-only true \
              --public-network-access Disabled \
              --only-show-errors \
              --output none
          fi

          echo "Validating private environment network integrity..."
          INTERNAL_CHECK=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.vnetConfiguration.internal" -o tsv)
          PNA_CHECK=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.publicNetworkAccess" -o tsv)
          ENV_SUBNET_ID=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.vnetConfiguration.infrastructureSubnetId" -o tsv)

          if [ "$INTERNAL_CHECK" != "true" ]; then
            echo "##vso[task.logissue type=error]ERROR: The environment is not internal. Detected value: '$INTERNAL_CHECK'."
            exit 1
          fi

          if [ "$PNA_CHECK" != "Disabled" ]; then
            echo "##vso[task.logissue type=error]ERROR: publicNetworkAccess is not disabled. Detected value: '$PNA_CHECK'."
            exit 1
          fi

          if [ -z "$ENV_SUBNET_ID" ] || [ "$ENV_SUBNET_ID" != "$SUBNET_ID" ]; then
            echo "##vso[task.logissue type=error]ERROR: The environment subnet does not match the expected one. Expected: '$SUBNET_ID'. Detected: '$ENV_SUBNET_ID'."
            exit 1
          fi
        elif [ "${{ parameters.caeManaged }}" = "True" ]; then
          if [ "$ENV_EXISTS" = "true" ]; then
            echo "The environment already exists. Its public network configuration will be validated."
          else
            echo "Creating public managed environment..."
            az containerapp env create \
              --name "${{ parameters.caeName }}" \
              --resource-group "${{ parameters.resourceGroup }}" \
              --location "${{ parameters.caeLocation }}" \
              --public-network-access Enabled \
              --only-show-errors \
              --output none
          fi

          echo "Validating public environment network integrity..."
          INTERNAL_CHECK=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.vnetConfiguration.internal" -o tsv)
          PNA_CHECK=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.publicNetworkAccess" -o tsv)
          ENV_SUBNET_ID=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.vnetConfiguration.infrastructureSubnetId" -o tsv)

          if [ "$INTERNAL_CHECK" = "true" ]; then
            echo "##vso[task.logissue type=error]ERROR: The public environment was found in internal mode."
            exit 1
          fi

          if [ "$PNA_CHECK" = "Disabled" ]; then
            echo "##vso[task.logissue type=error]ERROR: publicNetworkAccess is disabled in the public environment."
            exit 1
          fi

          if [ -n "$ENV_SUBNET_ID" ]; then
            echo "##vso[task.logissue type=error]ERROR: The public environment should not be associated with a subnet. Detected: '$ENV_SUBNET_ID'."
            exit 1
          fi
        else
          if [ "$ENV_EXISTS" != "true" ]; then
            echo "##vso[task.logissue type=error]ERROR: caeManaged=false requires the CAE to already exist. '${{ parameters.caeName }}' was not found."
            exit 1
          fi

          echo "The CAE already exists and will not be managed by this template."
          echo "Skipping CAE network validation because caeManaged=false."
        fi

  - task: AzureCLI@2
    displayName: 'Deploy ACA'
    name: deploy
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      visibleAzLogin: false
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        HAS_WARNINGS="false"

        echo "Validating ingress configuration..."
        USER_IDENTITY_ID=$(az identity show --name "${{ parameters.identityName }}" --resource-group "${{ parameters.resourceGroup }}" --query id -o tsv)
        echo "Identity resolved: ${USER_IDENTITY_ID}"
        IMAGE_NAME="${{ parameters.acrName }}.azurecr.io/${{ parameters.imageRepository }}:${{ parameters.imageTag }}"

        echo "Deployment configuration:"
        echo "  Resource group: ${{ parameters.resourceGroup }}"
        echo "  ACA environment: ${{ parameters.caeName }}"
        echo "  ACA app: ${{ parameters.acaName }}"
        echo "  Image: ${IMAGE_NAME}"
        echo "  Ingress: ${{ parameters.acaIngressType }}"
        echo "  Target port: ${{ parameters.acaTargetPort }}"
        echo "  CPU: ${{ parameters.acaCpu }}"
        echo "  Memory: ${{ parameters.acaMemory }}"
        if [ ${{ length(parameters.envVars) }} -gt 0 ]; then
          echo "  Env vars: ${{ join(', ', parameters.envVars) }}"
        else
          echo "  Env vars: <none>"
        fi

        case "${{ parameters.acaIngressType }}" in
          internal)
            EXPECTED_EXTERNAL="false"
            INGRESS_TYPE="internal"
            ;;
          external)
            EXPECTED_EXTERNAL="true"
            INGRESS_TYPE="external"
            ;;
          *)
            echo "##vso[task.logissue type=error]ERROR: Invalid value for acaIngressType='${{ parameters.acaIngressType }}'."
            exit 1
            ;;
        esac

        if az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" >/dev/null 2>&1; then
          echo "The app already exists. Applying update."
          APP_PROVISIONING_STATE=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.provisioningState" -o tsv || true)
          if [ "${APP_PROVISIONING_STATE:-}" = "Failed" ]; then
            echo "##vso[task.logissue type=error]Current provisioning state: Failed"
          else
            echo "Current provisioning state: ${APP_PROVISIONING_STATE:-<unknown>}"
          fi
          if [ "${APP_PROVISIONING_STATE:-}" = "Failed" ]; then
            echo "App is in failed provisioning state. Restarting latest revision before update..."
            LATEST_REVISION=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.latestRevisionName" -o tsv || true)
            if [ -n "${LATEST_REVISION:-}" ]; then
              az containerapp revision restart \
                --name "${{ parameters.acaName }}" \
                --resource-group "${{ parameters.resourceGroup }}" \
                --revision "$LATEST_REVISION" \
                --only-show-errors \
                --output none || true
              echo "Revision restart requested: $LATEST_REVISION"
              sleep 15
            else
              echo "##vso[task.logissue type=warning]WARNING: App is in Failed state but latestRevisionName is empty; skipping pre-update restart."
              echo "##vso[task.logissue type=warning]WARNING: Recovery is likely blocked in this state. You may need to delete '${{ parameters.acaName }}' manually in Azure Portal and let the pipeline create it again."
            fi
          fi

          az containerapp identity assign \
            --name "${{ parameters.acaName }}" \
            --resource-group "${{ parameters.resourceGroup }}" \
            --user-assigned "$USER_IDENTITY_ID" \
            --only-show-errors \
            --output none
          echo "Managed identity assigned."

          az containerapp registry set \
            --name "${{ parameters.acaName }}" \
            --resource-group "${{ parameters.resourceGroup }}" \
            --server "${{ parameters.acrName }}.azurecr.io" \
            --identity "$USER_IDENTITY_ID" \
            --only-show-errors \
            --output none
          echo "Registry configuration applied."

          UPDATE_ARGS=(
            --name "${{ parameters.acaName }}"
            --resource-group "${{ parameters.resourceGroup }}"
            --image "$IMAGE_NAME"
            --cpu "${{ parameters.acaCpu }}"
            --memory "${{ parameters.acaMemory }}"
            --min-replicas "${{ parameters.acaMinReplicas }}"
            --max-replicas "${{ parameters.acaMaxReplicas }}"
            --only-show-errors
            --output none
          )

          if [ ${{ length(parameters.envVars) }} -gt 0 ]; then
            UPDATE_ARGS+=(--set-env-vars ${{ join(' ', parameters.envVars) }})
          fi

          az containerapp update "${UPDATE_ARGS[@]}"
          echo "App updated."
        else
          echo "The app does not exist. Creating Container App."
          CREATE_ARGS=(
            --name "${{ parameters.acaName }}"
            --resource-group "${{ parameters.resourceGroup }}"
            --environment "${{ parameters.caeName }}"
            --image "$IMAGE_NAME"
            --cpu "${{ parameters.acaCpu }}"
            --memory "${{ parameters.acaMemory }}"
            --ingress "${{ parameters.acaIngressType }}"
            --target-port "${{ parameters.acaTargetPort }}"
            --registry-server "${{ parameters.acrName }}.azurecr.io"
            --registry-identity "$USER_IDENTITY_ID"
            --user-assigned "$USER_IDENTITY_ID"
            --min-replicas "${{ parameters.acaMinReplicas }}"
            --max-replicas "${{ parameters.acaMaxReplicas }}"
            --only-show-errors
            --output none
          )

          if [ ${{ length(parameters.envVars) }} -gt 0 ]; then
            CREATE_ARGS+=(--env-vars ${{ join(' ', parameters.envVars) }})
          fi

          az containerapp create "${CREATE_ARGS[@]}"
          echo "App created."
        fi

        echo "Ensuring app ingress is ${INGRESS_TYPE} on port ${{ parameters.acaTargetPort }}..."
        az containerapp ingress enable \
          --name "${{ parameters.acaName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --target-port "${{ parameters.acaTargetPort }}" \
          --type "$INGRESS_TYPE" \
          --only-show-errors \
          --output none
        echo "Ingress configured."

        echo
        echo "Running post-deployment validation..."
        APP_EXTERNAL=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.configuration.ingress.external" -o tsv)
        APP_IMAGE=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.template.containers[0].image" -o tsv)
        APP_REVISION=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.latestRevisionName" -o tsv)
        APP_FQDN=$(az containerapp show -n "${{ parameters.acaName }}" -g "${{ parameters.resourceGroup }}" --query "properties.configuration.ingress.fqdn" -o tsv)
        CAE_STATIC_IP=$(az containerapp env show -n "${{ parameters.caeName }}" -g "${{ parameters.resourceGroup }}" --query "properties.staticIp" -o tsv)
        APP_HOST="${{ parameters.acaName }}"

        if [ "$APP_EXTERNAL" != "$EXPECTED_EXTERNAL" ]; then
          echo "##vso[task.logissue type=error]ERROR: The app ingress does not match acaIngressType='${{ parameters.acaIngressType }}'. Detected external value: '$APP_EXTERNAL'."
          exit 1
        fi

        if [ "${{ parameters.acaIngressType }}" = "external" ] && [ -z "${APP_FQDN:-}" ]; then
          echo "##vso[task.logissue type=warning]WARNING: External ingress requires a non-empty FQDN."
          HAS_WARNINGS="true"
        fi

        echo "App verified: ingress ${{ parameters.acaIngressType }}."
        echo "##vso[task.setvariable variable=acaFqdn;isOutput=true]${APP_FQDN}"
        echo "##vso[task.setvariable variable=acaHost;isOutput=true]${APP_HOST}"
        
        echo
        echo "ACA deployment summary:"
        echo "  Image: $APP_IMAGE"
        echo "  Revision: ${APP_REVISION:-<sin-revision>}"
        echo "  Ingress: ${{ parameters.acaIngressType }}"
        echo "  FQDN: ${APP_FQDN:-<sin-fqdn>}"
        echo "  Host (internal): ${APP_HOST}"
        echo
        if [ "${{ parameters.useSubnet }}" = "True" ] && [ "${{ parameters.acaIngressType }}" = "external" ] && [ -n "${CAE_STATIC_IP:-}" ] && [ -n "${APP_FQDN:-}" ]; then
          echo "##vso[task.logissue type=warning]Remember to add this line to your hosts file: ${CAE_STATIC_IP} ${APP_FQDN}"
        fi

        if [ "$HAS_WARNINGS" = "true" ]; then
          echo "##vso[task.complete result=SucceededWithIssues;]External ingress is enabled but the ACA FQDN is empty."
        fi

  - template: ../scripts-templates/mark-build-published.yml@hf-azure-pipelines-repo
    parameters:
      tag: deployed
      tagPrefix: ${{ parameters.prefix }}
      tagSuffix: ${{ parameters.suffix }}

# Documentation
# - Purpose:
#   Deploy or update an Azure Container App, optionally managing the Container Apps
#   Environment and its subnet when the caller explicitly enables that behavior.
#
# - Main behavior:
#   1. Prepare Azure CLI and install/update the `containerapp` extension.
#   2. Validate ingress and environment parameters, and print an input/rule trace
#      in logs (`OK` / `SKIPPED`) to simplify troubleshooting.
#   3. If `caeManaged=true` and `useSubnet=true`, validate the subnet and apply the
#      required ACA delegation when the subnet is empty.
#   4. If `caeManaged=true`, create or validate the Container Apps Environment.
#   5. Create or update the Container App.
#      When the app already exists and `provisioningState=Failed`, restart the latest
#      revision before attempting `containerapp update`.
#   6. Re-apply ingress settings and validate the deployed application.
#   7. Mark the build as deployed with the specified prefix/suffix tags.
#
# - Outputs:
#   The deploy step is named `deploy` and exports:
#   - `deploy.acaFqdn`:
#     FQDN returned by Azure for the Container App ingress.
#     It can be empty when ingress is external but Azure has not populated it yet.
#   - `deploy.acaHost`:
#     Internal host value based on `acaName`.
#
#   Example usage from a downstream job:
#   - `$[ dependencies.<jobName>.outputs['deploy.acaFqdn'] ]`
#   - `$[ dependencies.<jobName>.outputs['deploy.acaHost'] ]`
#
# - Network rules:
#   - `caeManaged=false`:
#     the template does not validate or manage CAE network configuration.
#   - `caeManaged=true` and `useSubnet=false`:
#     the template expects a public CAE configuration.
#   - `caeManaged=true` and `useSubnet=true`:
#     the template expects a private CAE configuration backed by the requested subnet.
#
# - Warning behavior:
#   If the app uses external ingress but Azure returns an empty FQDN, the job finishes as
#   `SucceededWithIssues` instead of failing hard.
