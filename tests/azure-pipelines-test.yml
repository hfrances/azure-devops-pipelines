parameters:
  # Si es true, invierte los valores de isTested e isBroken para forzar escenario negativo en Alone y Single.
  - name: invertConditionFlags
    displayName: 'Invert variables (Alone and Single tests)'
    type: boolean
    default: false
  # Si es true, invierte los valores de isTestedA e isBrokenA para Combi A.
  - name: invertConditionFlagsCombiA
    displayName: 'Invert variables (Combi A)'
    type: boolean
    default: false
  # Si es true, invierte los valores de isTestedB e isBrokenB para Combi B.
  - name: invertConditionFlagsCombiB
    displayName: 'Invert variables (Combi B)'
    type: boolean
    default: false

trigger:
  batch: true
  branches:
    include:
      - master
      - main
      - staging
      - azure-pipelines
      - azure-pipelines-*
      - feature/aca-deploy-job-*

stages:
  # Stage: replica de pruebas pero consumiendo outputs de un job del mismo stage (dependencies).
  - stage: TestAlone
    displayName: Test Alone
    dependsOn: []
    condition: not(canceled())
    jobs:
      # Job productor local del stage: publica el mismo set de outputs/no-output para pruebas alone.
      - job: PrepareAlone
        displayName: Prepare alone outputs
        steps:
          - pwsh: |
              $isTested = 'true'
              $isBroken = 'false'

              $invertConditionFlags = '${{ parameters.invertConditionFlags }}'
              if ($invertConditionFlags -eq 'True') {
                $tmp = $isTested
                $isTested = $isBroken
                $isBroken = $tmp
              }

              $outBuildId = '$(Build.BuildId)'
              $outDefinitionName = '$(Build.DefinitionName)'
              $outSourceBranch = '$(Build.SourceBranch)'
              $plainLocalOnly = 'local-only-value'

              Write-Output ""

              Write-Output "invertConditionFlags: $invertConditionFlags"
              
              Write-Output "isTested: $isTested (output=true)"
              Write-Output "##vso[task.setvariable variable=isTested;isOutput=true]$isTested"

              Write-Output "isBroken: $isBroken (output=true)"
              Write-Output "##vso[task.setvariable variable=isBroken;isOutput=true]$isBroken"

              Write-Output ""

              Write-Output "outBuildId: $outBuildId (output=true)"
              Write-Output "##vso[task.setvariable variable=outBuildId;isOutput=true]$outBuildId"

              Write-Output "outDefinitionName: $outDefinitionName (output=true)"
              Write-Output "##vso[task.setvariable variable=outDefinitionName;isOutput=true]$outDefinitionName"

              Write-Output "outSourceBranch: $outSourceBranch (output=true)"
              Write-Output "##vso[task.setvariable variable=outSourceBranch;isOutput=true]$outSourceBranch"

              Write-Output "plainLocalOnly: $plainLocalOnly (output=false)"
              Write-Output "##vso[task.setvariable variable=plainLocalOnly]$plainLocalOnly"
            name: SetOutputsAlone
            displayName: Set outputs alone

      # Job test (directo): valida condicion por isTested y mapeo de outputs/no-outputs en alone.
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobCheckAlone
          displayName: Conditioned job check alone
          conditionalStage: ''
          conditionalJob: PrepareAlone
          conditionalTask: SetOutputsAlone
          conditionalVariable: isTested
          condition: not(canceled())
          mappingVariables:
            outBuildId: mappedOutBuildId
            outDefinitionName: mappedOutDefinitionName
            outSourceBranch: mappedOutSourceBranch
            plainLocalOnly: mappedPlainLocalOnly
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          steps:
            - pwsh: |
                $hasIssues = $false

                function Warn([string]$message) {
                  Write-Output "##vso[task.logissue type=warning]$message"
                  $script:hasIssues = $true
                }

                function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                  Write-Output "${key}: $actual"
                  if ([string]::IsNullOrWhiteSpace($actual)) {
                    Warn "${key} should have value but arrived empty."
                    return
                  }
                  if ($actual -ne $expected) {
                    Warn "${key} expected '$expected' but got '$actual'."
                  }
                }

                function CheckMustBeEmpty([string]$key, [string]$actual) {
                  Write-Output "${key}: $actual"
                  if (-not [string]::IsNullOrWhiteSpace($actual)) {
                    Warn "${key} should be empty because source variable was not output."
                  }
                }

                Write-Output "isTested: $(isTested)"
                if ('$(isTested)' -ne 'true') {
                  Warn "Conditional variable isTested should be true."
                }

                CheckExpected 'mappedOutBuildId' '$(mappedOutBuildId)' '$(expectedBuildId)'
                CheckExpected 'mappedOutDefinitionName' '$(mappedOutDefinitionName)' '$(expectedDefinitionName)'
                CheckExpected 'mappedOutSourceBranch' '$(mappedOutSourceBranch)' '$(expectedSourceBranch)'
                CheckMustBeEmpty 'mappedPlainLocalOnly' '$(mappedPlainLocalOnly)'

                if ($hasIssues) {
                  Write-Output "##vso[task.logissue type=warning]Validation finished with warnings."
                  Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"
                  exit 0
                }

                Write-Output "All validations passed."
              name: ValidateMappingsAlone
              displayName: Validate mapped variables alone
              condition: and(succeeded(), eq(variables['isTested'], 'true'))

      # Job test (wrapper): misma validacion via wrapper en alone.
      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: ''
          conditionalJob: PrepareAlone
          conditionalTask: SetOutputsAlone
          conditionalVariable: isTested
          condition: not(canceled())
          dependsOn:
            - ConditionedJobCheckAlone
          mappingVariables:
            outBuildId: wrapperMappedOutBuildId
            outDefinitionName: wrapperMappedOutDefinitionName
            outSourceBranch: wrapperMappedOutSourceBranch
            plainLocalOnly: wrapperMappedPlainLocalOnly
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          parameters:
            jobName: ConditionedJobWrapperCheckAlone
            displayName: Conditioned job wrapper check alone
            steps:
              - pwsh: |
                  $hasIssues = $false

                  function Warn([string]$message) {
                    Write-Output "##vso[task.logissue type=warning]$message"
                    $script:hasIssues = $true
                  }

                  function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                    Write-Output "${key}: $actual"
                    if ([string]::IsNullOrWhiteSpace($actual)) {
                      Warn "${key} should have value but arrived empty."
                      return
                    }
                    if ($actual -ne $expected) {
                      Warn "${key} expected '$expected' but got '$actual'."
                    }
                  }

                  function CheckMustBeEmpty([string]$key, [string]$actual) {
                    Write-Output "${key}: $actual"
                    if (-not [string]::IsNullOrWhiteSpace($actual)) {
                      Warn "${key} should be empty because source variable was not output."
                    }
                  }

                  Write-Output "isTested: $(isTested)"
                  if ('$(isTested)' -ne 'true') {
                    Warn "Conditional variable isTested should be true."
                  }

                  CheckExpected 'wrapperMappedOutBuildId' '$(wrapperMappedOutBuildId)' '$(expectedBuildId)'
                  CheckExpected 'wrapperMappedOutDefinitionName' '$(wrapperMappedOutDefinitionName)' '$(expectedDefinitionName)'
                  CheckExpected 'wrapperMappedOutSourceBranch' '$(wrapperMappedOutSourceBranch)' '$(expectedSourceBranch)'
                  CheckMustBeEmpty 'wrapperMappedPlainLocalOnly' '$(wrapperMappedPlainLocalOnly)'

                  if ($hasIssues) {
                    Write-Output "##vso[task.logissue type=warning]Validation finished with warnings."
                    Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"
                    exit 0
                  }

                  Write-Output "All validations passed."
                name: ValidateMappingsViaWrapperAlone
                displayName: Validate mapped variables via wrapper alone
                condition: and(succeeded(), eq(variables['isTested'], 'true'))

      # Job test negativo (directo): con isBroken=false debe quedar Skipped por condicion.
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobBrokenCheckAlone
          displayName: Conditioned job broken check alone
          conditionalStage: ''
          conditionalJob: PrepareAlone
          conditionalTask: SetOutputsAlone
          conditionalVariable: isBroken
          condition: not(canceled())
          dependsOn:
            - ConditionedJobWrapperCheckAlone
          steps:
            - pwsh: |
                Write-Output "isBroken: $(isBroken)"
                if ('$(isBroken)' -eq 'true') {
                  Write-Output "##vso[task.logissue type=error]isBroken is true. Failing as expected by test rule."
                  Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                }
              name: ValidateBrokenDirectAlone
              displayName: Validate broken variable direct alone

      # Job test negativo (wrapper): mismo escenario de isBroken=false, tambien debe quedar Skipped.
      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: ''
          conditionalJob: PrepareAlone
          conditionalTask: SetOutputsAlone
          conditionalVariable: isBroken
          condition: not(canceled())
          dependsOn:
            - ConditionedJobBrokenCheckAlone
          parameters:
            jobName: ConditionedJobWrapperBrokenCheckAlone
            displayName: Conditioned job wrapper broken check alone
            steps:
              - pwsh: |
                  Write-Output "isBroken: $(isBroken)"
                  if ('$(isBroken)' -eq 'true') {
                    Write-Output "##vso[task.logissue type=error]isBroken is true. Failing as expected by test rule."
                    Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                  }
                name: ValidateBrokenViaWrapperAlone
                displayName: Validate broken variable wrapper alone

      # Job de verificacion final alone: asegura estados esperados.
      - job: VerifyConditionedExecutionAlone
        displayName: Verify conditioned jobs execution alone
        dependsOn:
          - ConditionedJobCheckAlone
          - ConditionedJobWrapperCheckAlone
          - ConditionedJobBrokenCheckAlone
          - ConditionedJobWrapperBrokenCheckAlone
        condition: not(canceled())
        variables:
          resConditionedJobCheckAlone: $[ dependencies.ConditionedJobCheckAlone.result ]
          resConditionedJobWrapperCheckAlone: $[ dependencies.ConditionedJobWrapperCheckAlone.result ]
          resConditionedJobBrokenCheckAlone: $[ dependencies.ConditionedJobBrokenCheckAlone.result ]
          resConditionedJobWrapperBrokenCheckAlone: $[ dependencies.ConditionedJobWrapperBrokenCheckAlone.result ]
        steps:
          - pwsh: |
              $hasErrors = $false

              function CheckEqual([string]$key, [string]$actual, [string]$expected) {
                Write-Output "${key}: $actual"
                if ($actual -ne $expected) {
                  Write-Output "##vso[task.logissue type=error]${key} expected '$expected' but got '$actual'."
                  $script:hasErrors = $true
                }
              }

              CheckEqual 'ConditionedJobCheckAlone.result' '$(resConditionedJobCheckAlone)' 'Succeeded'
              CheckEqual 'ConditionedJobWrapperCheckAlone.result' '$(resConditionedJobWrapperCheckAlone)' 'Succeeded'
              CheckEqual 'ConditionedJobBrokenCheckAlone.result' '$(resConditionedJobBrokenCheckAlone)' 'Skipped'
              CheckEqual 'ConditionedJobWrapperBrokenCheckAlone.result' '$(resConditionedJobWrapperBrokenCheckAlone)' 'Skipped'

              if ($hasErrors) {
                Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
              }

              Write-Output "alone execution/results verification passed."
            name: VerifyExecutionResultsAlone
            displayName: Verify execution results alone

  # Stage: prepara variables de prueba y outputs para el resto de tests.
  - stage: PreparationSingle
    displayName: Preparation Single
    dependsOn: []
    condition: not(canceled())
    jobs:
      # Job: construye el contexto base de validacion (outputs y no-outputs).
      - job: Prepare
        displayName: Prepare
        steps:
          # Task: publica variables output (isTested, isBroken, out*) y una no-output (plainLocalOnly).
          - pwsh: |
              $isTested = 'true'
              $isBroken = 'false'

              $invertConditionFlags = '${{ parameters.invertConditionFlags }}'
              if ($invertConditionFlags -eq 'True') {
                $tmp = $isTested
                $isTested = $isBroken
                $isBroken = $tmp
              }

              $outBuildId = '$(Build.BuildId)'
              $outDefinitionName = '$(Build.DefinitionName)'
              $outSourceBranch = '$(Build.SourceBranch)'
              $plainLocalOnly = 'local-only-value'

              Write-Output ""

              Write-Output "invertConditionFlags: $invertConditionFlags"
              
              Write-Output "isTested: $isTested (output=true)"
              Write-Output "##vso[task.setvariable variable=isTested;isOutput=true]$isTested"

              Write-Output "isBroken: $isBroken (output=true)"
              Write-Output "##vso[task.setvariable variable=isBroken;isOutput=true]$isBroken"

              Write-Output ""

              Write-Output "outBuildId: $outBuildId (output=true)"
              Write-Output "##vso[task.setvariable variable=outBuildId;isOutput=true]$outBuildId"

              Write-Output "outDefinitionName: $outDefinitionName (output=true)"
              Write-Output "##vso[task.setvariable variable=outDefinitionName;isOutput=true]$outDefinitionName"

              Write-Output "outSourceBranch: $outSourceBranch (output=true)"
              Write-Output "##vso[task.setvariable variable=outSourceBranch;isOutput=true]$outSourceBranch"

              Write-Output "plainLocalOnly: $plainLocalOnly (output=false)"
              Write-Output "##vso[task.setvariable variable=plainLocalOnly]$plainLocalOnly"
            name: SetOutputs
            displayName: Set outputs

  # Stage: ejecuta las pruebas de conditioned-job y conditioned-job-wrapper.
  # Debe ejecutarse siempre para observar resultados incluso con fallos previos.
  - stage: TestSingle
    displayName: Test Single
    dependsOn: PreparationSingle
    condition: not(canceled())
    jobs:
      # Job test (directo): valida condicion por isTested y mapeo de outputs/no-outputs.
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobCheck
          displayName: Conditioned job check
          conditionalStage: PreparationSingle
          conditionalJob: Prepare
          conditionalTask: SetOutputs
          conditionalVariable: isTested
          condition: not(canceled())
          mappingVariables:
            outBuildId: mappedOutBuildId
            outDefinitionName: mappedOutDefinitionName
            outSourceBranch: mappedOutSourceBranch
            plainLocalOnly: mappedPlainLocalOnly
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          steps:
            # Task test: comprueba que outputs llegan, no-outputs no llegan y reporta warnings.
            - pwsh: |
                $hasIssues = $false

                function Warn([string]$message) {
                  Write-Output "##vso[task.logissue type=warning]$message"
                  $script:hasIssues = $true
                }

                function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                  Write-Output "${key}: $actual"
                  if ([string]::IsNullOrWhiteSpace($actual)) {
                    Warn "${key} should have value but arrived empty."
                    return
                  }
                  if ($actual -ne $expected) {
                    Warn "${key} expected '$expected' but got '$actual'."
                  }
                }

                function CheckMustBeEmpty([string]$key, [string]$actual) {
                  Write-Output "${key}: $actual"
                  if (-not [string]::IsNullOrWhiteSpace($actual)) {
                    Warn "${key} should be empty because source variable was not output."
                  }
                }

                Write-Output "isTested: $(isTested)"
                if ('$(isTested)' -ne 'true') {
                  Warn "Conditional variable isTested should be true."
                }

                CheckExpected 'mappedOutBuildId' '$(mappedOutBuildId)' '$(expectedBuildId)'
                CheckExpected 'mappedOutDefinitionName' '$(mappedOutDefinitionName)' '$(expectedDefinitionName)'
                CheckExpected 'mappedOutSourceBranch' '$(mappedOutSourceBranch)' '$(expectedSourceBranch)'
                CheckMustBeEmpty 'mappedPlainLocalOnly' '$(mappedPlainLocalOnly)'

                if ($hasIssues) {
                  Write-Output "##vso[task.logissue type=warning]Validation finished with warnings."
                  Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"
                  exit 0
                }

                Write-Output "All validations passed."
              name: ValidateMappings
              displayName: Validate mapped variables
              condition: and(succeeded(), eq(variables['isTested'], 'true'))

      # Job test (wrapper): misma validacion que el job directo pero pasando por wrapper.
      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationSingle
          conditionalJob: Prepare
          conditionalTask: SetOutputs
          conditionalVariable: isTested
          condition: not(canceled())
          dependsOn:
            - ConditionedJobCheck
          mappingVariables:
            outBuildId: wrapperMappedOutBuildId
            outDefinitionName: wrapperMappedOutDefinitionName
            outSourceBranch: wrapperMappedOutSourceBranch
            plainLocalOnly: wrapperMappedPlainLocalOnly
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          parameters:
            jobName: ConditionedJobWrapperCheck
            displayName: Conditioned job wrapper check
            steps:
              # Task test: valida condicion y mapeos en la ruta wrapper.
              - pwsh: |
                  $hasIssues = $false

                  function Warn([string]$message) {
                    Write-Output "##vso[task.logissue type=warning]$message"
                    $script:hasIssues = $true
                  }

                  function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                    Write-Output "${key}: $actual"
                    if ([string]::IsNullOrWhiteSpace($actual)) {
                      Warn "${key} should have value but arrived empty."
                      return
                    }
                    if ($actual -ne $expected) {
                      Warn "${key} expected '$expected' but got '$actual'."
                    }
                  }

                  function CheckMustBeEmpty([string]$key, [string]$actual) {
                    Write-Output "${key}: $actual"
                    if (-not [string]::IsNullOrWhiteSpace($actual)) {
                      Warn "${key} should be empty because source variable was not output."
                    }
                  }

                  Write-Output "isTested: $(isTested)"
                  if ('$(isTested)' -ne 'true') {
                    Warn "Conditional variable isTested should be true."
                  }

                  CheckExpected 'wrapperMappedOutBuildId' '$(wrapperMappedOutBuildId)' '$(expectedBuildId)'
                  CheckExpected 'wrapperMappedOutDefinitionName' '$(wrapperMappedOutDefinitionName)' '$(expectedDefinitionName)'
                  CheckExpected 'wrapperMappedOutSourceBranch' '$(wrapperMappedOutSourceBranch)' '$(expectedSourceBranch)'
                  CheckMustBeEmpty 'wrapperMappedPlainLocalOnly' '$(wrapperMappedPlainLocalOnly)'

                  if ($hasIssues) {
                    Write-Output "##vso[task.logissue type=warning]Validation finished with warnings."
                    Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"
                    exit 0
                  }

                  Write-Output "All validations passed."
                name: ValidateMappingsViaWrapper
                displayName: Validate mapped variables via wrapper
                condition: and(succeeded(), eq(variables['isTested'], 'true'))

      # Job test negativo (directo): con isBroken=false debe quedar Skipped por condicion.
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobBrokenCheck
          displayName: Conditioned job broken check
          conditionalStage: PreparationSingle
          conditionalJob: Prepare
          conditionalTask: SetOutputs
          conditionalVariable: isBroken
          condition: not(canceled())
          dependsOn:
            - ConditionedJobWrapperCheck
          steps:
            # Task: solo fallaria si isBroken=true; en este escenario no deberia ejecutarse.
            - pwsh: |
                Write-Output "isBroken: $(isBroken)"
                if ('$(isBroken)' -eq 'true') {
                  Write-Output "##vso[task.logissue type=error]isBroken is true. Failing as expected by test rule."
                  Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                }
              name: ValidateBrokenDirect
              displayName: Validate broken variable (direct)

      # Job test negativo (wrapper): mismo escenario de isBroken=false, tambien debe quedar Skipped.
      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationSingle
          conditionalJob: Prepare
          conditionalTask: SetOutputs
          conditionalVariable: isBroken
          condition: not(canceled())
          dependsOn:
            - ConditionedJobBrokenCheck
          parameters:
            jobName: ConditionedJobWrapperBrokenCheck
            displayName: Conditioned job wrapper broken check
            steps:
              # Task: espejo del test negativo en la ruta wrapper.
              - pwsh: |
                  Write-Output "isBroken: $(isBroken)"
                  if ('$(isBroken)' -eq 'true') {
                    Write-Output "##vso[task.logissue type=error]isBroken is true. Failing as expected by test rule."
                    Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                  }
                name: ValidateBrokenViaWrapper
                displayName: Validate broken variable (wrapper)

      # Job de verificacion final: asegura que los jobs esperados corrieron/skippearon sin errores.
      - job: VerifyConditionedExecution
        displayName: Verify conditioned jobs execution
        dependsOn:
          - ConditionedJobCheck
          - ConditionedJobWrapperCheck
          - ConditionedJobBrokenCheck
          - ConditionedJobWrapperBrokenCheck
        condition: not(canceled())
        variables:
          resConditionedJobCheck: $[ dependencies.ConditionedJobCheck.result ]
          resConditionedJobWrapperCheck: $[ dependencies.ConditionedJobWrapperCheck.result ]
          resConditionedJobBrokenCheck: $[ dependencies.ConditionedJobBrokenCheck.result ]
          resConditionedJobWrapperBrokenCheck: $[ dependencies.ConditionedJobWrapperBrokenCheck.result ]
        steps:
          # Task de aserciones finales de estado por job.
          - pwsh: |
              $hasErrors = $false

              function CheckEqual([string]$key, [string]$actual, [string]$expected) {
                Write-Output "${key}: $actual"
                if ($actual -ne $expected) {
                  Write-Output "##vso[task.logissue type=error]${key} expected '$expected' but got '$actual'."
                  $script:hasErrors = $true
                }
              }

              CheckEqual 'ConditionedJobCheck.result' '$(resConditionedJobCheck)' 'Succeeded'
              CheckEqual 'ConditionedJobWrapperCheck.result' '$(resConditionedJobWrapperCheck)' 'Succeeded'
              CheckEqual 'ConditionedJobBrokenCheck.result' '$(resConditionedJobBrokenCheck)' 'Skipped'
              CheckEqual 'ConditionedJobWrapperBrokenCheck.result' '$(resConditionedJobWrapperBrokenCheck)' 'Skipped'

              if ($hasErrors) {
                Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
              }

              Write-Output "Execution/results verification passed."
            name: VerifyExecutionResults
            displayName: Verify execution results

  # Stage template del caso Single (dependiente de PreparationSingle).
  - template: /scripts-templates/stages/conditioned-stage.yml
    parameters:
      stageName: StageSingle
      displayName: Stage Single
      conditionalStage: PreparationSingle
      conditionalJob: Prepare
      conditionalTask: SetOutputs
      conditionalVariable: isTested
      condition: not(canceled())
      jobs:
        - job: StageSingleMarker
          displayName: Stage single marker
          steps:
            - pwsh: |
                Write-Output "StageSingle ejecutado con isTested=true desde PreparationSingle."
                Write-Output "stageSingleExecuted: true (output=true)"
                Write-Output "##vso[task.setvariable variable=stageSingleExecuted;isOutput=true]true"
              name: Marker
              displayName: Marker

  # Stage: prepara variables A/B y un Summary agregado para escenario Combi.
  - stage: PreparationCombi
    displayName: Preparation Combi
    dependsOn: []
    jobs:
      - job: PrepareCombi
        displayName: Prepare combi
        steps:
          # Task 1: genera flags y datos output para testA.
          - pwsh: |
              $isTestedA = 'true'
              $isBrokenA = 'false'

              $invertConditionFlags = '${{ parameters.invertConditionFlagsCombiA }}'
              if ($invertConditionFlags -eq 'True') {
                $tmp = $isTestedA
                $isTestedA = $isBrokenA
                $isBrokenA = $tmp
              }

              $outBuildIdA = '$(Build.BuildId)'
              $outDefinitionNameA = '$(Build.DefinitionName)'
              $outSourceBranchA = '$(Build.SourceBranch)'
              $plainLocalOnlyA = 'local-only-value-A'

              Write-Output "testA.invertConditionFlagsCombiA: $invertConditionFlags"
              Write-Output "testA.isTestedA: $isTestedA (output=true)"
              Write-Output "##vso[task.setvariable variable=isTestedA;isOutput=true]$isTestedA"
              Write-Output "testA.isBrokenA: $isBrokenA (output=true)"
              Write-Output "##vso[task.setvariable variable=isBrokenA;isOutput=true]$isBrokenA"
              Write-Output "testA.outBuildIdA: $outBuildIdA (output=true)"
              Write-Output "##vso[task.setvariable variable=outBuildIdA;isOutput=true]$outBuildIdA"
              Write-Output "testA.outDefinitionNameA: $outDefinitionNameA (output=true)"
              Write-Output "##vso[task.setvariable variable=outDefinitionNameA;isOutput=true]$outDefinitionNameA"
              Write-Output "testA.outSourceBranchA: $outSourceBranchA (output=true)"
              Write-Output "##vso[task.setvariable variable=outSourceBranchA;isOutput=true]$outSourceBranchA"
              Write-Output "testA.plainLocalOnlyA: $plainLocalOnlyA (output=false)"
              Write-Output "##vso[task.setvariable variable=plainLocalOnlyA]$plainLocalOnlyA"
            name: SetOutputsA
            displayName: Set outputs A

          # Task 2: genera flags y datos output para testB.
          - pwsh: |
              $isTestedB = 'true'
              $isBrokenB = 'false'

              $invertConditionFlags = '${{ parameters.invertConditionFlagsCombiB }}'
              if ($invertConditionFlags -eq 'True') {
                $tmp = $isTestedB
                $isTestedB = $isBrokenB
                $isBrokenB = $tmp
              }

              $outBuildIdB = '$(Build.BuildId)'
              $outDefinitionNameB = '$(Build.DefinitionName)'
              $outSourceBranchB = '$(Build.SourceBranch)'
              $plainLocalOnlyB = 'local-only-value-B'

              Write-Output "testB.invertConditionFlagsCombiB: $invertConditionFlags"
              Write-Output "testB.isTestedB: $isTestedB (output=true)"
              Write-Output "##vso[task.setvariable variable=isTestedB;isOutput=true]$isTestedB"
              Write-Output "testB.isBrokenB: $isBrokenB (output=true)"
              Write-Output "##vso[task.setvariable variable=isBrokenB;isOutput=true]$isBrokenB"
              Write-Output "testB.outBuildIdB: $outBuildIdB (output=true)"
              Write-Output "##vso[task.setvariable variable=outBuildIdB;isOutput=true]$outBuildIdB"
              Write-Output "testB.outDefinitionNameB: $outDefinitionNameB (output=true)"
              Write-Output "##vso[task.setvariable variable=outDefinitionNameB;isOutput=true]$outDefinitionNameB"
              Write-Output "testB.outSourceBranchB: $outSourceBranchB (output=true)"
              Write-Output "##vso[task.setvariable variable=outSourceBranchB;isOutput=true]$outSourceBranchB"
              Write-Output "testB.plainLocalOnlyB: $plainLocalOnlyB (output=false)"
              Write-Output "##vso[task.setvariable variable=plainLocalOnlyB]$plainLocalOnlyB"
            name: SetOutputsB
            displayName: Set outputs B

          # Task 3: Summary agregado de flags A/B.
          - pwsh: |
              $isTestedA = '$(SetOutputsA.isTestedA)'
              $isTestedB = '$(SetOutputsB.isTestedB)'
              $isBrokenA = '$(SetOutputsA.isBrokenA)'
              $isBrokenB = '$(SetOutputsB.isBrokenB)'

              $isTestedSummary = if ($isTestedA -eq 'true' -and $isTestedB -eq 'true') { 'true' } else { 'false' }
              $isBrokenSummary = if ($isBrokenA -eq 'true' -and $isBrokenB -eq 'true') { 'true' } else { 'false' }

              Write-Output "summary.isTestedA: $isTestedA"
              Write-Output "summary.isTestedB: $isTestedB"
              Write-Output "summary.isBrokenA: $isBrokenA"
              Write-Output "summary.isBrokenB: $isBrokenB"
              Write-Output "summary.isTestedSummary: $isTestedSummary (output=true)"
              Write-Output "##vso[task.setvariable variable=isTestedSummary;isOutput=true]$isTestedSummary"
              Write-Output "summary.isBrokenSummary: $isBrokenSummary (output=true)"
              Write-Output "##vso[task.setvariable variable=isBrokenSummary;isOutput=true]$isBrokenSummary"
            name: SetSummary
            displayName: Set summary outputs

  # Stage: pruebas Combi (A/B), condicionadas por Summary de PreparationCombi.
  - stage: TestCombi
    displayName: Test Combi
    dependsOn: PreparationCombi
    condition: not(canceled())
    jobs:
      # A positivos (directo + wrapper)
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobCheckA
          displayName: Conditioned job check A
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsA
          conditionalVariable: isTestedA
          condition: not(canceled())
          mappingVariables:
            outBuildIdA: mappedOutBuildIdA
            outDefinitionNameA: mappedOutDefinitionNameA
            outSourceBranchA: mappedOutSourceBranchA
            plainLocalOnlyA: mappedPlainLocalOnlyA
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          steps:
            - pwsh: |
                $hasIssues = $false
                function Warn([string]$message) { Write-Output "##vso[task.logissue type=warning]$message"; $script:hasIssues = $true }
                function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                  Write-Output "${key}: $actual"
                  if ([string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should have value but arrived empty."; return }
                  if ($actual -ne $expected) { Warn "${key} expected '$expected' but got '$actual'." }
                }
                function CheckMustBeEmpty([string]$key, [string]$actual) {
                  Write-Output "${key}: $actual"
                  if (-not [string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should be empty because source variable was not output." }
                }
                Write-Output "isTestedA: $(isTestedA)"
                if ('$(isTestedA)' -ne 'true') { Warn "Conditional variable isTestedA should be true." }
                CheckExpected 'mappedOutBuildIdA' '$(mappedOutBuildIdA)' '$(expectedBuildId)'
                CheckExpected 'mappedOutDefinitionNameA' '$(mappedOutDefinitionNameA)' '$(expectedDefinitionName)'
                CheckExpected 'mappedOutSourceBranchA' '$(mappedOutSourceBranchA)' '$(expectedSourceBranch)'
                CheckMustBeEmpty 'mappedPlainLocalOnlyA' '$(mappedPlainLocalOnlyA)'
                if ($hasIssues) { Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"; exit 0 }
              name: ValidateMappingsA
              displayName: Validate mapped variables A
              condition: and(succeeded(), eq(variables['isTestedA'], 'true'))

      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsA
          conditionalVariable: isTestedA
          condition: not(canceled())
          dependsOn:
            - ConditionedJobCheckA
          mappingVariables:
            outBuildIdA: wrapperMappedOutBuildIdA
            outDefinitionNameA: wrapperMappedOutDefinitionNameA
            outSourceBranchA: wrapperMappedOutSourceBranchA
            plainLocalOnlyA: wrapperMappedPlainLocalOnlyA
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          parameters:
            jobName: ConditionedJobWrapperCheckA
            displayName: Conditioned job wrapper check A
            steps:
              - pwsh: |
                  $hasIssues = $false
                  function Warn([string]$message) { Write-Output "##vso[task.logissue type=warning]$message"; $script:hasIssues = $true }
                  function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                    Write-Output "${key}: $actual"
                    if ([string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should have value but arrived empty."; return }
                    if ($actual -ne $expected) { Warn "${key} expected '$expected' but got '$actual'." }
                  }
                  function CheckMustBeEmpty([string]$key, [string]$actual) {
                    Write-Output "${key}: $actual"
                    if (-not [string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should be empty because source variable was not output." }
                  }
                  Write-Output "isTestedA: $(isTestedA)"
                  if ('$(isTestedA)' -ne 'true') { Warn "Conditional variable isTestedA should be true." }
                  CheckExpected 'wrapperMappedOutBuildIdA' '$(wrapperMappedOutBuildIdA)' '$(expectedBuildId)'
                  CheckExpected 'wrapperMappedOutDefinitionNameA' '$(wrapperMappedOutDefinitionNameA)' '$(expectedDefinitionName)'
                  CheckExpected 'wrapperMappedOutSourceBranchA' '$(wrapperMappedOutSourceBranchA)' '$(expectedSourceBranch)'
                  CheckMustBeEmpty 'wrapperMappedPlainLocalOnlyA' '$(wrapperMappedPlainLocalOnlyA)'
                  if ($hasIssues) { Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"; exit 0 }
                name: ValidateMappingsViaWrapperA
                displayName: Validate mapped variables via wrapper A
                condition: and(succeeded(), eq(variables['isTestedA'], 'true'))

      # A negativos (directo + wrapper)
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobBrokenCheckA
          displayName: Conditioned job broken check A
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsA
          conditionalVariable: isBrokenA
          condition: not(canceled())
          dependsOn:
            - ConditionedJobWrapperCheckA
          steps:
            - pwsh: |
                Write-Output "isBrokenA: $(isBrokenA)"
                if ('$(isBrokenA)' -eq 'true') {
                  Write-Output "##vso[task.logissue type=error]isBrokenA is true. Failing as expected by test rule."
                  Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                }
              name: ValidateBrokenDirectA
              displayName: Validate broken variable direct A

      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsA
          conditionalVariable: isBrokenA
          condition: not(canceled())
          dependsOn:
            - ConditionedJobBrokenCheckA
          parameters:
            jobName: ConditionedJobWrapperBrokenCheckA
            displayName: Conditioned job wrapper broken check A
            steps:
              - pwsh: |
                  Write-Output "isBrokenA: $(isBrokenA)"
                  if ('$(isBrokenA)' -eq 'true') {
                    Write-Output "##vso[task.logissue type=error]isBrokenA is true. Failing as expected by test rule."
                    Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                  }
                name: ValidateBrokenViaWrapperA
                displayName: Validate broken variable wrapper A

      # B positivos (directo + wrapper)
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobCheckB
          displayName: Conditioned job check B
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsB
          conditionalVariable: isTestedB
          condition: not(canceled())
          dependsOn:
            - ConditionedJobWrapperBrokenCheckA
          mappingVariables:
            outBuildIdB: mappedOutBuildIdB
            outDefinitionNameB: mappedOutDefinitionNameB
            outSourceBranchB: mappedOutSourceBranchB
            plainLocalOnlyB: mappedPlainLocalOnlyB
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          steps:
            - pwsh: |
                $hasIssues = $false
                function Warn([string]$message) { Write-Output "##vso[task.logissue type=warning]$message"; $script:hasIssues = $true }
                function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                  Write-Output "${key}: $actual"
                  if ([string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should have value but arrived empty."; return }
                  if ($actual -ne $expected) { Warn "${key} expected '$expected' but got '$actual'." }
                }
                function CheckMustBeEmpty([string]$key, [string]$actual) {
                  Write-Output "${key}: $actual"
                  if (-not [string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should be empty because source variable was not output." }
                }
                Write-Output "isTestedB: $(isTestedB)"
                if ('$(isTestedB)' -ne 'true') { Warn "Conditional variable isTestedB should be true." }
                CheckExpected 'mappedOutBuildIdB' '$(mappedOutBuildIdB)' '$(expectedBuildId)'
                CheckExpected 'mappedOutDefinitionNameB' '$(mappedOutDefinitionNameB)' '$(expectedDefinitionName)'
                CheckExpected 'mappedOutSourceBranchB' '$(mappedOutSourceBranchB)' '$(expectedSourceBranch)'
                CheckMustBeEmpty 'mappedPlainLocalOnlyB' '$(mappedPlainLocalOnlyB)'
                if ($hasIssues) { Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"; exit 0 }
              name: ValidateMappingsB
              displayName: Validate mapped variables B
              condition: and(succeeded(), eq(variables['isTestedB'], 'true'))

      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsB
          conditionalVariable: isTestedB
          condition: not(canceled())
          dependsOn:
            - ConditionedJobCheckB
          mappingVariables:
            outBuildIdB: wrapperMappedOutBuildIdB
            outDefinitionNameB: wrapperMappedOutDefinitionNameB
            outSourceBranchB: wrapperMappedOutSourceBranchB
            plainLocalOnlyB: wrapperMappedPlainLocalOnlyB
          additionalVariables:
            expectedBuildId: $(Build.BuildId)
            expectedDefinitionName: $(Build.DefinitionName)
            expectedSourceBranch: $(Build.SourceBranch)
          parameters:
            jobName: ConditionedJobWrapperCheckB
            displayName: Conditioned job wrapper check B
            steps:
              - pwsh: |
                  $hasIssues = $false
                  function Warn([string]$message) { Write-Output "##vso[task.logissue type=warning]$message"; $script:hasIssues = $true }
                  function CheckExpected([string]$key, [string]$actual, [string]$expected) {
                    Write-Output "${key}: $actual"
                    if ([string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should have value but arrived empty."; return }
                    if ($actual -ne $expected) { Warn "${key} expected '$expected' but got '$actual'." }
                  }
                  function CheckMustBeEmpty([string]$key, [string]$actual) {
                    Write-Output "${key}: $actual"
                    if (-not [string]::IsNullOrWhiteSpace($actual)) { Warn "${key} should be empty because source variable was not output." }
                  }
                  Write-Output "isTestedB: $(isTestedB)"
                  if ('$(isTestedB)' -ne 'true') { Warn "Conditional variable isTestedB should be true." }
                  CheckExpected 'wrapperMappedOutBuildIdB' '$(wrapperMappedOutBuildIdB)' '$(expectedBuildId)'
                  CheckExpected 'wrapperMappedOutDefinitionNameB' '$(wrapperMappedOutDefinitionNameB)' '$(expectedDefinitionName)'
                  CheckExpected 'wrapperMappedOutSourceBranchB' '$(wrapperMappedOutSourceBranchB)' '$(expectedSourceBranch)'
                  CheckMustBeEmpty 'wrapperMappedPlainLocalOnlyB' '$(wrapperMappedPlainLocalOnlyB)'
                  if ($hasIssues) { Write-Output "##vso[task.complete result=SucceededWithIssues;]DONE"; exit 0 }
                name: ValidateMappingsViaWrapperB
                displayName: Validate mapped variables via wrapper B
                condition: and(succeeded(), eq(variables['isTestedB'], 'true'))

      # B negativos (directo + wrapper)
      - template: /scripts-templates/jobs/conditioned-job.yml
        parameters:
          jobName: ConditionedJobBrokenCheckB
          displayName: Conditioned job broken check B
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsB
          conditionalVariable: isBrokenB
          condition: not(canceled())
          dependsOn:
            - ConditionedJobWrapperCheckB
          steps:
            - pwsh: |
                Write-Output "isBrokenB: $(isBrokenB)"
                if ('$(isBrokenB)' -eq 'true') {
                  Write-Output "##vso[task.logissue type=error]isBrokenB is true. Failing as expected by test rule."
                  Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
                }
              name: ValidateBrokenDirectB
              displayName: Validate broken variable direct B

      - template: /scripts-templates/jobs/conditioned-job-wrapper.yml
        parameters:
          template: /tests/templates/conditioned-wrapper-target-job.yml
          conditionalStage: PreparationCombi
          conditionalJob: PrepareCombi
          conditionalTask: SetOutputsB
          conditionalVariable: isBrokenB
          condition: not(canceled())
          dependsOn:
            - ConditionedJobBrokenCheckB
          parameters:
            jobName: ConditionedJobWrapperBrokenCheckB
            displayName: Conditioned job wrapper broken check B
            steps:
