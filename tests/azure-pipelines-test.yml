      # Verificador final Combi.
      - job: VerifyConditionedExecutionCombi
        displayName: Verify conditioned jobs execution combi
        dependsOn:
          - ConditionedJobCheckA
          - ConditionedJobWrapperCheckA
          - ConditionedJobBrokenCheckA
          - ConditionedJobWrapperBrokenCheckA
          - ConditionedJobCheckB
          - ConditionedJobWrapperCheckB
          - ConditionedJobBrokenCheckB
          - ConditionedJobWrapperBrokenCheckB
        condition: not(canceled())
        variables:
          resConditionedJobCheckA: $[ dependencies.ConditionedJobCheckA.result ]
          resConditionedJobWrapperCheckA: $[ dependencies.ConditionedJobWrapperCheckA.result ]
          resConditionedJobBrokenCheckA: $[ dependencies.ConditionedJobBrokenCheckA.result ]
          resConditionedJobWrapperBrokenCheckA: $[ dependencies.ConditionedJobWrapperBrokenCheckA.result ]
          resConditionedJobCheckB: $[ dependencies.ConditionedJobCheckB.result ]
          resConditionedJobWrapperCheckB: $[ dependencies.ConditionedJobWrapperCheckB.result ]
          resConditionedJobBrokenCheckB: $[ dependencies.ConditionedJobBrokenCheckB.result ]
          resConditionedJobWrapperBrokenCheckB: $[ dependencies.ConditionedJobWrapperBrokenCheckB.result ]
        steps:
          - pwsh: |
              $hasErrors = $false
              function CheckEqual([string]$key, [string]$actual, [string]$expected) {
                Write-Output "${key}: $actual"
                if ($actual -ne $expected) {
                  Write-Output "##vso[task.logissue type=error]${key} expected '$expected' but got '$actual'."
                  $script:hasErrors = $true
                }
              }

              CheckEqual 'ConditionedJobCheckA.result' '$(resConditionedJobCheckA)' 'Succeeded'
              CheckEqual 'ConditionedJobWrapperCheckA.result' '$(resConditionedJobWrapperCheckA)' 'Succeeded'
              CheckEqual 'ConditionedJobBrokenCheckA.result' '$(resConditionedJobBrokenCheckA)' 'Skipped'
              CheckEqual 'ConditionedJobWrapperBrokenCheckA.result' '$(resConditionedJobWrapperBrokenCheckA)' 'Skipped'

              CheckEqual 'ConditionedJobCheckB.result' '$(resConditionedJobCheckB)' 'Succeeded'
              CheckEqual 'ConditionedJobWrapperCheckB.result' '$(resConditionedJobWrapperCheckB)' 'Succeeded'
              CheckEqual 'ConditionedJobBrokenCheckB.result' '$(resConditionedJobBrokenCheckB)' 'Skipped'
              CheckEqual 'ConditionedJobWrapperBrokenCheckB.result' '$(resConditionedJobWrapperBrokenCheckB)' 'Skipped'

              if ($hasErrors) {
                Write-Output "##vso[task.complete result=Failed;]DONE"
                  exit 1
              }

              Write-Output "Combi execution/results verification passed."
            name: VerifyExecutionResultsCombi
            displayName: Verify execution results combi

  # Stage template del caso Combi (dependiente de PreparationCombi).
  - template: /scripts-templates/stages/conditioned-stage.yml
    parameters:
      stageName: StageCombi
      displayName: Stage Combi
      conditionalStage: PreparationCombi
      conditionalJob: PrepareCombi
      conditionalTask: SetSummary
      conditionalVariable: isTestedSummary
      condition: not(canceled())
      jobs:
        - job: StageCombiMarker
          displayName: Stage combi marker
          steps:
            - pwsh: |
                Write-Output "StageCombi ejecutado con isTestedSummary=true desde PreparationCombi."
                Write-Output "stageCombiExecuted: true (output=true)"
                Write-Output "##vso[task.setvariable variable=stageCombiExecuted;isOutput=true]true"
              name: Marker
              displayName: Marker

  # Stage final: valida que StageSingle y StageCombi se han ejecutado realmente.
  - stage: VerifyTemplatedStages
    displayName: Verify templated stages execution
    dependsOn:
      - StageSingle
      - StageCombi
    condition: not(canceled())
    jobs:
      - job: VerifyStagesExecution
        displayName: Verify StageSingle and StageCombi
        variables:
          stageSingleExecuted: $[ stageDependencies.StageSingle.StageSingleMarker.outputs['Marker.stageSingleExecuted'] ]
          stageCombiExecuted: $[ stageDependencies.StageCombi.StageCombiMarker.outputs['Marker.stageCombiExecuted'] ]
          stageSingleMarkerResult: $[ stageDependencies.StageSingle.StageSingleMarker.result ]
          stageCombiMarkerResult: $[ stageDependencies.StageCombi.StageCombiMarker.result ]
        steps:
          - pwsh: |
              $hasErrors = $false

              function CheckTrue([string]$key, [string]$actual) {
                Write-Output "${key}: $actual"
                if ($actual -ne 'true') {
                  Write-Output "##vso[task.logissue type=error]${key} expected 'true' but got '$actual'."
                  $script:hasErrors = $true
                }
              }

              function CheckSucceeded([string]$key, [string]$actual) {
                Write-Output "${key}: $actual"
                if ($actual -ne 'Succeeded') {
                  Write-Output "##vso[task.logissue type=error]${key} expected 'Succeeded' but got '$actual'."
                  $script:hasErrors = $true
                }
              }

              CheckSucceeded 'StageSingle.result' '$(stageSingleMarkerResult)'
              CheckSucceeded 'StageCombi.result' '$(stageCombiMarkerResult)'
              CheckTrue 'stageSingleExecuted' '$(stageSingleExecuted)'
              CheckTrue 'stageCombiExecuted' '$(stageCombiExecuted)'

              if ($hasErrors) {
                Write-Output "##vso[task.complete result=Failed;]DONE"
                exit 1
              }

              Write-Output "Templated stages execution verification passed."
            name: VerifyTemplatedStagesExecution
            displayName: Verify templated stages execution
