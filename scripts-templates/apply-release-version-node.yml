parameters:
  - name: workingDirectory
    type: string
    default: '$(Build.SourcesDirectory)'
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        $packageJsonPath = 'package.json'
        $version = '$(BuildParameters.ReleaseVersion)'

        if (!(Test-Path $packageJsonPath)) {
          Write-Error "package.json not found: $packageJsonPath"
          exit 1
        }

        if ([string]::IsNullOrWhiteSpace($version)) {
          Write-Warning 'No release version calculated. Skipping package.json update.'
          exit 0
        }

        $json = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
        $json.version = $version
        $json | ConvertTo-Json -Depth 100 | Set-Content $packageJsonPath
        Write-Output "Updated package.json version to: $version"
      workingDirectory: ${{ parameters.workingDirectory }}
    displayName: Apply release version to package.json
    condition: ${{ parameters.condition }}