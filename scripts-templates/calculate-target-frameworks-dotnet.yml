parameters:
  - name: supportedFrameworks
    type: string
    default: '$(SupportedFrameworks)'
  - name: solutionPattern
    type: string
    default: '$(BuildParameters.Solution)'
  - name: testProjects
    type: string
    default: '$(BuildParameters.TestProjects)'
  - name: testEnabled
    type: string
    default: 'true'
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        $taskHasIssues = $false;
        function mark-task-issue([string]$message) {
          write-warning $message;
          $script:taskHasIssues = $true;
        }

        # Get the solution pattern to identify project files
        $solutionPattern = "${{ parameters.solutionPattern }}";
        $testProjectsPattern = "${{ parameters.testProjects }}";
        $testEnabled = [System.Convert]::ToBoolean("${{ parameters.testEnabled }}");
        
        Write-Host "Solution pattern:";
        Write-Host "$solutionPattern";
        Write-Host '';
        Write-Host "Test projects pattern:";
        Write-Host "$testProjectsPattern";
        Write-Host '';
        Write-Host "Test enabled: $testEnabled";
        Write-Host '';
        
        # Find all project files from the solution
        $projFiles = @();
        
        # Get projects from solution file if it exists
        $solutionFiles = Get-ChildItem -Recurse -Filter $solutionPattern -ErrorAction SilentlyContinue;
        if ($solutionFiles.Count -gt 0) {
          foreach ($slnFile in $solutionFiles) {
            if ($slnFile.Extension -ieq '.sln') {
              $slnContent = Get-Content -Path $slnFile.FullName -Raw;
              # Extract project references from .sln file (pattern: Project(...) = ..., ...)
              $projectMatches = [regex]::Matches($slnContent, 'Project\([^)]*\)\s*=\s*[^,]*,\s*"([^"]*\.(?:csproj|vbproj|fsproj))"');
              foreach ($match in $projectMatches) {
                $projPath = Join-Path -Path $slnFile.Directory.FullName -ChildPath $match.Groups[1].Value;
                $projPath = [System.IO.Path]::GetFullPath($projPath);
                if (Test-Path -Path $projPath) {
                  $projFiles += Get-Item -Path $projPath;
                }
              }
            }
            elseif ($slnFile.Extension -ieq '.slnx') {
              [xml]$slnXml = Get-Content -Path $slnFile.FullName -Raw;
              $projectNodes = @($slnXml.SelectNodes('//Project[@Path]'));
              foreach ($projectNode in $projectNodes) {
                $projPath = Join-Path -Path $slnFile.Directory.FullName -ChildPath $projectNode.Attributes['Path'].Value;
                $projPath = [System.IO.Path]::GetFullPath($projPath);
                if (Test-Path -Path $projPath) {
                  $projFiles += Get-Item -Path $projPath;
                }
              }
            }
          }
        }
        
        # If no solution file found or no projects in solution, fall back to searching for all projects
        if ($projFiles.Count -eq 0) {
          mark-task-issue "No projects found in solution files. Searching for all project files...";
          $projFiles = @(Get-ChildItem -Recurse -Filter *.??proj);
        }
        
        # Add test projects if test is enabled
        $files = @($projFiles);
        if ($testEnabled) {
          Write-Host "Looking for test projects...";
          $testPatterns = $testProjectsPattern.Split([System.Environment]::NewLine) | ForEach-Object { $_.Trim() } | Where-Object { $_ };
          Write-Host "Test patterns found: $($testPatterns.Count)";
          
          # Collect all test files first (without exclusions)
          $allTestFiles = @();
          $inclusionPatterns = @($testPatterns | Where-Object { -not $_.StartsWith('!') });
          $exclusionPatterns = @($testPatterns | Where-Object { $_.StartsWith('!') } | ForEach-Object { $_.Substring(1) });
          
          Write-Host "Inclusion patterns: $($inclusionPatterns -join ', ')";
          Write-Host "Exclusion patterns: $($exclusionPatterns -join ', ')";
          
          foreach ($pattern in $inclusionPatterns) {
            Write-Host "Searching with pattern: $pattern";
            # Convert glob pattern to PowerShell path pattern
            $psPattern = $pattern -replace '\*\*/', '*/' -replace '\?', '?';
            $psPattern = "*" + $psPattern;
            $testFiles = @(Get-ChildItem -Recurse -Path $psPattern -ErrorAction SilentlyContinue | Where-Object { $_.PSIsContainer -eq $false });
            Write-Host "Found $($testFiles.Count) files with pattern '$pattern'";
            $allTestFiles += $testFiles;
          }
          
          # Apply exclusion patterns
          $filteredTestFiles = @();
          foreach ($testFile in $allTestFiles) {
            $shouldExclude = $false;
            $relativePath = $testFile.FullName;
            
            foreach ($exclusionPattern in $exclusionPatterns) {
              $excludePs = $exclusionPattern -replace '\*\*/', '*/' -replace '\?', '?';
              if ($relativePath -like "*$excludePs" -or $testFile.Name -like $excludePs) {
                $shouldExclude = $true;
                Write-Host "Excluding: $($testFile.Name) (matched pattern: $exclusionPattern)";
                break;
              }
            }
            
            if (-not $shouldExclude) {
              Write-Host "Including test file: $($testFile.FullName)";
              $filteredTestFiles += $testFile;
            }
          }
          
          Write-Host "Total test files after filtering: $($filteredTestFiles.Count)";
          Write-Host '';
          $files += $filteredTestFiles;
        }
        
        # Remove duplicates
        $files = @($files | Sort-Object -Unique -Property FullName);
        
        # Get supported frameworks.
        $supportedFrameworks = "${{ parameters.supportedFrameworks }}".Split(';') | ForEach-Object { $_.Trim() };
        Write-Host "Supported frameworks: $supportedFrameworks";
        
        # Get installed frameworks.            
        $installedSdks = &dotnet --list-sdks;
        $installedFrameworks = New-Object System.Collections.Generic.HashSet[string];
        foreach ($sdk in $installedSdks) {
          if ($sdk -match '^(?<version>\d+\.\d+)') {
            $installedFrameworks.Add($matches['version']) | Out-Null;
          }
        }
        Write-Host "Installed frameworks: $installedFrameworks";
        Write-Host '';

        # Calculate necessary frameworks.
        $allRequiredFrameworks = New-Object System.Collections.Generic.HashSet[string];
        $frameworksToInstall = New-Object System.Collections.Generic.HashSet[string];
        if ($files.Count -eq 0) {
          mark-task-issue 'No project files found in the specified directory.';
        } else {
          $files | ForEach-Object {
            $file = $_;
            Write-Host "Processing file: $file";
  
            # Load the XML content of the project file
            $xml = [xml](Get-Content -Path $file.FullName);
  
            # Calculate target frameworks
            $frameworks = "$($xml.Project.PropertyGroup.TargetFrameworks)"?.Trim().Split(";");
            if (-not $frameworks) {
              $frameworks = @("$($xml.Project.PropertyGroup.TargetFramework)"?.Trim());
            }
            Write-Host "Target frameworks: $frameworks";
            $frameworks | ForEach-Object {
              $version = [regex]::match($_, '(\d+\.\d+)').Value;
              if ($version) {
                Write-Host "##vso[task.setvariable variable=BuildParameters.TargetFramework_$version]$_";
                $allRequiredFrameworks.Add($version) | Out-Null;
              }
            }
            Write-Host '';
          }
        }

        # Install frameworks: if any required framework is missing, reinstall all required frameworks >= the minimum missing one
        if ($allRequiredFrameworks.Count -gt 0) {
          # Filter required frameworks to only those in supportedFrameworks and sort them
          $supportedRequired = @($allRequiredFrameworks | Where-Object { $supportedFrameworks -contains $_ } | Sort-Object { [double]$_ });
          
          if ($supportedRequired.Count -gt 0) {
            Write-Host "Required frameworks (supported only): $($supportedRequired -join ', ')";
            Write-Host '';
            
            # Find the minimum required framework that is not installed
            $minMissingFramework = $null;
            foreach ($framework in $supportedRequired) {
              if ($installedFrameworks -notcontains $framework) {
                $minMissingFramework = $framework;
                break;
              }
            }
            
            # If there's a missing framework, install all required frameworks >= that minimum
            if ($minMissingFramework -ne $null) {
              foreach ($framework in $supportedRequired) {
                $frameworkNumeric = [double]$framework;
                $minNumeric = [double]$minMissingFramework;
                if ($frameworkNumeric -ge $minNumeric) {
                  $frameworksToInstall.Add($framework) | Out-Null;
                }
              }
            }
          } else {
            write-warning "No supported frameworks found in project requirements";
          }
        }

        # Display pending frameworks to install (only those in supportedFrameworks, sorted)
        $pendingSupported = @($frameworksToInstall | Sort-Object { [double]$_ });
        if ($pendingSupported.Count -gt 0) {
          Write-Host "Pending to install frameworks: $($pendingSupported -join ', ')";
        } else {
          Write-Host "Pending to install frameworks: None";
        }
        
        # Set variables for framework installation (in ascending order to avoid conflicts)
        foreach ($framework in $pendingSupported) {
          Write-Host "##vso[task.setvariable variable=BuildParameters.TargetFramework_Install_$framework]net$framework";
        }

        if ($taskHasIssues) {
          Write-Host "##vso[task.complete result=SucceededWithIssues;]Calculate target frameworks completed with warnings.";
        }
    displayName: Calculate target frameworks
    condition: ${{ parameters.condition }}
