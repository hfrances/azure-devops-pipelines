parameters:
  - name: taskName
    type: string
    default: '' # DetectDeployableBuilds
  - name: displayName
    type: string
    default: Resolve candidate run id from tags
  - name: definitionName
    type: string
    default: ''
  - name: tagPrefix
    type: string
    default: ''
  - name: tagSuffix
    type: string
    default: ''

steps:
  - task: PowerShell@2
    name: ${{ coalesce(parameters.taskName, format('{0}{1}{2}', 'DetectDeployableBuilds', replace(replace(replace(replace(replace(replace(coalesce(parameters.definitionName, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_'), '~', ''), replace(replace(replace(format('{0}_{1}', replace(replace(replace(replace(replace(coalesce(parameters.tagPrefix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_'), replace(replace(replace(replace(replace(coalesce(parameters.tagSuffix, '~'), '/', '_'), '-', '_'), ' ', '_'), '.', '_'), ':', '_')), '~_~', ''), '~_', ''), '_~', ''))) }}
    displayName: ${{ parameters.displayName }}
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'
        if ([string]::IsNullOrWhiteSpace($env:SYSTEM_ACCESSTOKEN)) {
          throw "System.AccessToken is not available. Enable OAuth token access for scripts."
        }

        $collectionUri = "$(System.TeamFoundationCollectionUri)"
        $project = "$(System.TeamProject)"
        $headers = @{ Authorization = "Bearer $($env:SYSTEM_ACCESSTOKEN)" }

        $definitionName = "${{ parameters.definitionName }}"
        if ([string]::IsNullOrWhiteSpace($definitionName)) {
          throw "Parameter definitionName is required."
        }

        $suffixRaw = "${{ parameters.tagSuffix }}"
        if ([string]::IsNullOrWhiteSpace($suffixRaw)) {
          throw "Parameter tagSuffix is required."
        }
        $suffix = $suffixRaw.Trim().ToLowerInvariant()

        $prefixRaw = "${{ parameters.tagPrefix }}".Trim()

        $requiredBase = switch ($suffix) {
          'test' { 'published' }
          'pre'  { 'deployed-test' }
          'pro'  { 'deployed-pre' }
          default { 'published' }
        }
        $excludedBase = "deployed-$suffix"

        $requiredTag = if ([string]::IsNullOrWhiteSpace($prefixRaw)) { $requiredBase } else { "$prefixRaw/$requiredBase" }
        $excludedTag = if ([string]::IsNullOrWhiteSpace($prefixRaw)) { $excludedBase } else { "$prefixRaw/$excludedBase" }

        $defUri = "$collectionUri$project/_apis/build/definitions?name=$([uri]::EscapeDataString($definitionName))&api-version=7.1"
        $defs = Invoke-RestMethod -Method Get -Uri $defUri -Headers $headers
        if (-not $defs.value -or $defs.value.Count -eq 0) {
          throw "No build definition found for '$definitionName'."
        }
        $definitionId = [string]$defs.value[0].id

        $buildsUri = "$collectionUri$project/_apis/build/builds?definitions=$definitionId&statusFilter=completed&resultFilter=succeeded&queryOrder=finishTimeDescending&`$top=200&api-version=7.1"
        $buildsResponse = Invoke-RestMethod -Method Get -Uri $buildsUri -Headers $headers
        $builds = @($buildsResponse.value)

        $tagCache = @{}
        function Get-BuildTags([int]$buildId) {
          if ($tagCache.ContainsKey($buildId)) {
            return $tagCache[$buildId]
          }
          $tagsUri = "$collectionUri$project/_apis/build/builds/$buildId/tags?api-version=7.1"
          $tagsResponse = Invoke-RestMethod -Method Get -Uri $tagsUri -Headers $headers
          $tags = @()
          if ($tagsResponse.value) { $tags = @($tagsResponse.value) }
          $tagCache[$buildId] = $tags
          return $tags
        }

        $candidateRunId = ''
        foreach ($b in $builds) {
          $tags = Get-BuildTags -buildId $b.id
          if (($tags -contains $requiredTag) -and -not ($tags -contains $excludedTag)) {
            $candidateRunId = [string]$b.id
            break
          }
        }

        $pending = if ($candidateRunId -ne '') { 'true' } else { 'false' }
        Write-Host "Resolved tags: required=$requiredTag excluded=$excludedTag candidate=$candidateRunId pending=$pending"

        Write-Output "##vso[task.setvariable variable=DefinitionId]$definitionId"
        Write-Output "##vso[task.setvariable variable=RequiredTag]$requiredTag"
        Write-Output "##vso[task.setvariable variable=ExcludedTag]$excludedTag"
        Write-Output "##vso[task.setvariable variable=CandidateRunId]$candidateRunId"
        Write-Output "##vso[task.setvariable variable=Pending]$pending"
