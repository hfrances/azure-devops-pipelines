parameters:
  - name: enabled
    type: boolean
    default: true
  - name: workingDirectory
    type: string
    default: ''
  - name: solutionPath
    type: string
    default: '$(Solution.FullName)'
  - name: tagSuffix
    type: string
    default: ''
  - name: tagPrefix
    type: string
    default: ''
  - name: includedPatterns
    type: object
    default: []
  - name: excludedPatterns
    type: object
    default: []
  - name: publishExtraMode
    type: string
    default: none
    values:
      - none
      - aspnet

steps:
  - task: PowerShell@2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      INCLUDED_PATTERNS_JSON: '${{ convertToJson(parameters.includedPatterns) }}'
      EXCLUDED_PATTERNS_JSON: '${{ convertToJson(parameters.excludedPatterns) }}'
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference='Stop';$global:LASTEXITCODE=0
        $taskHasIssues=$false
        function log($t,$m){if(!$m){return};if($t -eq 'warning'){Write-Output "##vso[task.logissue type=warning]$m"}elseif($t -eq 'error'){Write-Output "##vso[task.logissue type=error]$m"}else{Write-Output $m}}
        function markissue($m){if(!$m){return};$script:taskHasIssues=$true;log warning $m}
        function blank(){Write-Output ''}
        function section($m){blank;Write-Output "=== $m ==="}
        function bool($v,$d=$false){if([string]::IsNullOrWhiteSpace($v) -or $v -like '$(*'){return $d};[System.Convert]::ToBoolean($v)}
        function norm($p){($p-replace'\\','/').TrimStart('./')}
        function inwd($p,$wd){if([string]::IsNullOrWhiteSpace($wd)){return $true};$n=norm $p;$w=(norm $wd).TrimEnd('/');return $n.StartsWith("$w/",[System.StringComparison]::OrdinalIgnoreCase) -or $n.Equals($w,[System.StringComparison]::OrdinalIgnoreCase)}
        function relwd($p,$wd){$n=norm $p;if([string]::IsNullOrWhiteSpace($wd)){return $n};$w=(norm $wd).TrimEnd('/');if($n.Equals($w,[System.StringComparison]::OrdinalIgnoreCase)){return ''};if($n.StartsWith("$w/",[System.StringComparison]::OrdinalIgnoreCase)){return $n.Substring($w.Length+1)};return $n}
        function any($p,$ps){foreach($x in $ps){if(([System.Management.Automation.WildcardPattern]::new((norm $x),[System.Management.Automation.WildcardOptions]::IgnoreCase)).IsMatch($p)){return $true}};return $false}
        function baseline($h,$tag){$o=$env:SYSTEM_COLLECTIONURI.TrimEnd('/');$p=[System.Uri]::EscapeDataString($env:SYSTEM_TEAMPROJECT);$d=$env:SYSTEM_DEFINITIONID;$b=[System.Uri]::EscapeDataString($env:BUILD_SOURCEBRANCH);$c=$env:BUILD_BUILDID;$u="$o/$p/_apis/build/builds?definitions=$d&branchName=$b&resultFilter=succeeded&queryOrder=finishTimeDescending&statusFilter=completed&tagFilters=$tag&`$top=25&api-version=7.1";(Invoke-RestMethod -Uri $u -Headers $h -Method Get).value|?{"$($_.id)" -ne "$c"}|select -First 1}
        function gitok($cmd,$err){$r=@(iex $cmd|%{norm $_}|?{$_});$e=$LASTEXITCODE;$global:LASTEXITCODE=0;if($e -ne 0){throw $err};$r}
        function gitlines($cmd,$err){$r=@(iex $cmd|?{$_});$e=$LASTEXITCODE;$global:LASTEXITCODE=0;if($e -ne 0){throw $err};$r}
        function hasbuildchanges($files,$wd,$cfg){return @($files).Count -gt 0}
        function haspublishinputchanges($files,$wd,$cfg){return @($files).Count -gt 0}
        function cfg($mode,$wd,$patterns,$expatterns){$r=[ordered]@{Include=@();Exclude=@()};if($mode -ne 'aspnet'){return [pscustomobject]$r};$r.Include=if($patterns.Count){@($patterns)}else{@('**/Dockerfile','**/*.json','**/*.xml','**/*.config','**/*.resx','**/wwwroot/**')};$r.Exclude=if($expatterns.Count){@($expatterns)}else{@('README*','**/README*','docs/**','.github/**','.azuredevops/**','azure-pipelines*.yml','**/azure-pipelines*.yml','**/bin/**','**/obj/**')};$f=if([string]::IsNullOrWhiteSpace($wd)){Join-Path $env:BUILD_SOURCESDIRECTORY '.azuredevops/publish-extra-paths.txt'}else{Join-Path (Join-Path $env:BUILD_SOURCESDIRECTORY $wd) '.azuredevops/publish-extra-paths.txt'};if(!(Test-Path $f)){$f=Join-Path $env:BUILD_SOURCESDIRECTORY '.azuredevops/publish-extra-paths.txt'};if(!(Test-Path $f)){return [pscustomobject]$r};Write-Output "Publish extra config file: $f";$sec='';$in=@();$ex=@();foreach($l in Get-Content $f){$t=$l.Trim();if(!$t -or $t.StartsWith('#')){continue};if($t-match'^\[(.+)\]$'){$sec=$matches[1].ToLowerInvariant();continue};if($sec -eq 'include'){$in+=$t}elseif($sec -eq 'exclude'){$ex+=$t}};if($in.Count){$r.Include=$in};if($ex.Count){$r.Exclude=$ex};[pscustomobject]$r}
        function suffixname($name,$suffix){if([string]::IsNullOrWhiteSpace($suffix)){return $name};$base=[System.IO.Path]::GetFileNameWithoutExtension($name);$ext=[System.IO.Path]::GetExtension($name);"$base-$suffix$ext"}
        function report($name,$base,$files,$reason,$suffix,$commits){$drop=Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'drop';if(!(Test-Path $drop)){ni -ItemType Directory -Path $drop -Force|Out-Null};$p=Join-Path $drop (suffixname $name $suffix);$b=if($base){$base}else{'<none>'};$lines=@("# current: $env:BUILD_SOURCEVERSION","# baseline: $b","# files: $($files.Count)","# changes: $($commits.Count)");if($reason){$lines+="# reason: $reason"};$lines+='';$lines+="## changes ($($commits.Count))";if($commits.Count){$lines+=@($commits|%{"- $_"})}else{$lines+='- <none>'};$lines+='';$lines+="## files ($($files.Count))";if($files.Count){$lines+=@($files|%{"- $_"})}else{$lines+='- <none>'};Set-Content $p $lines;Write-Output "Changed files report: $p"}
        function underwd($p,$wd){
          $n=norm $p
          if([string]::IsNullOrWhiteSpace($wd) -or [string]::IsNullOrWhiteSpace($n)){return $n}
          $w=(norm $wd).TrimEnd('/')
          if($n.Equals($w,[System.StringComparison]::OrdinalIgnoreCase) -or $n.StartsWith("$w/",[System.StringComparison]::OrdinalIgnoreCase)){return $n}
          return "$w/$n"
        }
        function publishable($p){$n=norm $p;return -not($n -match '(^|/)(examples?)(/|$)' -or $n -match '(^|/)[^/]*\.Tests?(\.|/|$)' -or $n -match '(^|/)[^/]*Tests?\.(cs|fs|vb)proj$')}
        function affected($tool,$base,$name,$sol){$dir=Join-Path $env:AGENT_TEMPDIRECTORY 'dotnet-affected-output';$file=Join-Path $dir "$name.proj";ni -ItemType Directory -Path $dir -Force|Out-Null;if(Test-Path $file){ri $file -Force};$out=& $tool --repository-path $env:BUILD_SOURCESDIRECTORY --solution-path $sol --from $base --to $env:BUILD_SOURCEVERSION --format traversal --output-dir $dir --output-name $name 2>&1;$code=$LASTEXITCODE;$global:LASTEXITCODE=0;$txt=@($out)-join[Environment]::NewLine;$r=[ordered]@{Ok=$false;Code=$code;File=$file;Projects=@();Out=$txt;Err=''};if($code -eq 166){$r.Ok=$true;return [pscustomobject]$r};if($code -ne 0){$r.Err="dotnet-affected failed for baseline '$base'.";return [pscustomobject]$r};if(!(Test-Path $file)){$r.Err="dotnet-affected did not generate '$file'.";return [pscustomobject]$r};[xml]$xml=Get-Content $file -Raw;$r.Projects=@($xml.Project.ItemGroup.ProjectReference|%{$_.Include}|?{$_}|%{$c=if([System.IO.Path]::IsPathRooted($_)){$_}else{Join-Path $env:BUILD_SOURCESDIRECTORY $_};norm([System.IO.Path]::GetRelativePath($env:BUILD_SOURCESDIRECTORY,(Resolve-Path $c).Path))});$r.Ok=$true;[pscustomobject]$r}
        function copydrop($src,$name,$suffix){if(Test-Path $src){$drop=Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'drop';if(!(Test-Path $drop)){ni -ItemType Directory -Path $drop -Force|Out-Null};$dst=Join-Path $drop (suffixname $name $suffix);Copy-Item -LiteralPath $src -Destination $dst -Force;Write-Output "Drop file exported: $dst"}}
        function ensuretool($dir,$ver){ni -ItemType Directory -Path $dir -Force|Out-Null;Write-Host '';Write-Host '=== dotnet-affected ===';Write-Host "Resolving tool version $ver";& dotnet tool update dotnet-affected --tool-path $dir --version $ver --verbosity quiet 2>&1 | Out-Null;if($LASTEXITCODE -ne 0){$global:LASTEXITCODE=0;& dotnet tool install dotnet-affected --tool-path $dir --version $ver --verbosity quiet 2>&1 | Out-Null;if($LASTEXITCODE -ne 0){throw 'Unable to install dotnet-affected.'};Write-Host 'dotnet-affected installed.'}else{Write-Host 'dotnet-affected updated.'};$global:LASTEXITCODE=0;$tool=Join-Path $dir 'dotnet-affected.exe';if(!(Test-Path $tool)){$tool=Join-Path $dir 'dotnet-affected'};if(!(Test-Path $tool)){throw "dotnet-affected executable not found in '$dir'."};return $tool}
        $enabled=bool "${{ parameters.enabled }}" $true;$solution="${{ parameters.solutionPath }}";$wd=norm "${{ parameters.workingDirectory }}";$suffix='${{ parameters.tagSuffix }}';$tagPrefix='${{ parameters.tagPrefix }}';if(-not [string]::IsNullOrWhiteSpace($tagPrefix) -and -not $tagPrefix.EndsWith('/')){$tagPrefix="$tagPrefix/"};$compiledTag=if([string]::IsNullOrWhiteSpace($suffix)){'compiled'}else{"compiled-$suffix"};if(-not[string]::IsNullOrWhiteSpace($tagPrefix)){$compiledTag="$tagPrefix$compiledTag"};$publishedTag=if([string]::IsNullOrWhiteSpace($suffix)){'published'}else{"published-$suffix"};if(-not[string]::IsNullOrWhiteSpace($tagPrefix)){$publishedTag="$tagPrefix$publishedTag"};$mode="${{ parameters.publishExtraMode }}";$ver='6.2.0';$patterns=@();$expatterns=@();$buildCfg=$null;if($env:INCLUDED_PATTERNS_JSON){$patterns=@((ConvertFrom-Json -InputObject $env:INCLUDED_PATTERNS_JSON)|%{norm "$_"})};if($env:EXCLUDED_PATTERNS_JSON){$expatterns=@((ConvertFrom-Json -InputObject $env:EXCLUDED_PATTERNS_JSON)|%{norm "$_"})}
        $cb='';$pb='';$bskip='';$pskip='';$bskipType='info';$pskipType='info';$build=$true;$publish=$true;$bfiles=@();$pfiles=@();$bcommits=@();$pcommits=@()
        if(!(Test-Path $solution)){throw "Resolved solution path not found: $solution"}
        section 'Baseline comparison'
        Write-Output "Current commit: $env:BUILD_SOURCEVERSION"
        try{
          if($enabled){if(!$env:SYSTEM_ACCESSTOKEN){throw 'System.AccessToken is not available.'};$h=@{Authorization="Bearer $($env:SYSTEM_ACCESSTOKEN)"};$cbld=baseline $h $compiledTag;$pbld=baseline $h $publishedTag;if($cbld){$cb="$($cbld.sourceVersion)";Write-Output "Compiled baseline build: $($cbld.id)";Write-Output "Compiled baseline commit: $cb";Write-Output "Compiled comparison: $cb -> $env:BUILD_SOURCEVERSION"}else{Write-Output 'Compiled baseline build: <none>';Write-Output 'Compiled baseline commit: <none>'};if($pbld){$pb="$($pbld.sourceVersion)";Write-Output "Published baseline build: $($pbld.id)";Write-Output "Published baseline commit: $pb";Write-Output "Published comparison: $pb -> $env:BUILD_SOURCEVERSION"}else{Write-Output 'Published baseline build: <none>';Write-Output 'Published baseline commit: <none>'};if($cb){& git cat-file -e "$cb^{commit}" 2>$null;$e=$LASTEXITCODE;$global:LASTEXITCODE=0;if($e -ne 0){throw "Compiled baseline commit '$cb' is not available locally. Ensure checkout uses fetchDepth: 0."}};if($pb){& git cat-file -e "$pb^{commit}" 2>$null;$e=$LASTEXITCODE;$global:LASTEXITCODE=0;if($e -ne 0){throw "Published baseline commit '$pb' is not available locally. Ensure checkout uses fetchDepth: 0."}};if($cb -and $cb -eq $env:BUILD_SOURCEVERSION){$build=$false;$bskip='Current commit matches the last compiled build.'}elseif($cb){$bfiles=@(gitok "git diff --name-only `"$cb...$env:BUILD_SOURCEVERSION`"" "git diff failed for baseline '$cb'."|?{inwd $_ $wd});$bcommits=@(gitlines "git log --format=`"%s`" `"$cb..$env:BUILD_SOURCEVERSION`"" "git log failed for baseline '$cb'.");$build=hasbuildchanges $bfiles $wd $buildCfg;if(!$build){$bskip='No file changes since the last compiled build.'}};if($pb -and $pb -eq $env:BUILD_SOURCEVERSION){$publish=$false;$pskip='Current commit matches the last published build.'}elseif($pb){$pfiles=@(gitok "git diff --name-only `"$pb...$env:BUILD_SOURCEVERSION`"" "git diff failed for baseline '$pb'."|?{inwd $_ $wd});$pcommits=@(gitlines "git log --format=`"%s`" `"$pb..$env:BUILD_SOURCEVERSION`"" "git log failed for baseline '$pb'.");$publish=haspublishinputchanges $pfiles $wd $buildCfg;if(!$publish){$publish=$false;$pskip='No relevant file changes since the last published build.'}}}
          else{Write-Output 'Change detection disabled. Keeping default affected flags (build=true, publish=true).'}
          section 'Changed files'
          report 'changed-files-build.txt' $cb $bfiles $bskip $suffix $bcommits;report 'changed-files-deploy.txt' $pb $pfiles $pskip $suffix $pcommits; if($bcommits.Count){Write-Output "Build commits: $($bcommits.Count)";$bcommits|%{Write-Output " - commit: $_"}}; if($pcommits.Count){Write-Output "Publish commits: $($pcommits.Count)";$pcommits|%{Write-Output " - commit: $_"}}; if($cb){Write-Output "Build changed files: $($bfiles.Count)"}; if($pb){Write-Output "Publish changed files: $($pfiles.Count)"}
          if($enabled -and (($cb -and $build) -or ($pb -and $publish))){$toolDir=Join-Path $env:AGENT_TEMPDIRECTORY 'dotnet-tools';$tool=ensuretool $toolDir $ver;if($cb -and $build){section 'Affected build';$r=affected $tool $cb 'affected-build' $solution;Write-Output "dotnet-affected build exit code: $($r.Code)";if(!$r.Ok){if($r.Out){log warning $r.Out};if($r.Code -eq 1){throw "dotnet-affected build exit code 1. Detection will continue in fail-open mode."};throw $r.Err};copydrop $r.File 'affected-build.proj' $suffix;$build=$r.Projects.Count -gt 0;if($build){Write-Output "Affected build projects: $($r.Projects.Count)";$r.Projects|%{Write-Output " - build: $_"}}else{$bskip='No affected projects since the last compiled build.'}}elseif($cb){section 'Affected build';Write-Output "dotnet-affected build exit code: <not-run>"};if($pb -and $publish){section 'Affected publish';$r=affected $tool $pb 'affected-publish' $solution;Write-Output "dotnet-affected publish exit code: $($r.Code)";if(!$r.Ok){if($r.Out){log warning $r.Out};throw $r.Err};copydrop $r.File 'affected-publish.proj' $suffix;$pps=@($r.Projects|?{publishable $_});$extras=@();if($mode -eq 'aspnet'){$c=cfg $mode $wd $patterns $expatterns;Write-Output "Publish extra include patterns: $($c.Include.Count)";Write-Output "Publish extra exclude patterns: $($c.Exclude.Count)";$extras=@($pfiles|?{ $x=relwd $_ $wd; (any $x $c.Include) -and -not (any $x $c.Exclude) })};$publish=($pps.Count -gt 0) -or ($extras.Count -gt 0);if($publish){if($pps.Count){Write-Output "Affected publish projects: $($pps.Count)";$pps|%{Write-Output " - publish: $_"}};if($extras.Count){Write-Output "Affected extra publish files: $($extras.Count)";$extras|%{Write-Output " - extra: $_"}}}else{$pskip='No publishable changes since the last published build.'}}elseif($pb){section 'Affected publish';Write-Output "dotnet-affected publish exit code: <not-run>"}}
        }catch{markissue $_.Exception.Message;$build=$true;$publish=$true;$bskip="Detection failed: $($_.Exception.Message)";$bskipType='warning';$pskip="Detection failed: $($_.Exception.Message)";$pskipType='warning';$global:LASTEXITCODE=0}
        Write-Output "##vso[task.setvariable variable=BuildParameters.HasAffectedBuildProjects]$($build.ToString().ToLowerInvariant())"
        Write-Output "##vso[task.setvariable variable=BuildParameters.HasAffectedPublishProjects]$($publish.ToString().ToLowerInvariant())"
        section 'Final decision'
        Write-Output "BuildParameters.HasAffectedBuildProjects: $build";Write-Output "BuildParameters.HasAffectedPublishProjects: $publish"
        if((-not $build) -and $bskip){log $bskipType "Build skip reason: $bskip"};if((-not $publish) -and $pskip){log $pskipType "Publish skip reason: $pskip"};if($taskHasIssues){Write-Output "##vso[task.complete result=SucceededWithIssues;]Detect compiled and published changes completed with warnings."};$global:LASTEXITCODE=0
    displayName: Detect compiled and published changes

# Documentation
# - Purpose:
#   Decide independently whether the current pipeline run must rebuild and/or republish,
#   using the last successful build tagged as "compiled" and "published" for the same
#   pipeline definition and branch.
#
# - Parity note:
#   This template is the canonical parity reference for:
#   - `detect-publishable-changes-dotnet.yml`
#   - `detect-publishable-changes-git.yml`
#   Before changing shared logic/shape, read:
#   `docs/features/change-detection-parity.md`
#   This note is also intended for AI-assisted edits.
#
# - Inputs:
#   - parameter enabled:
#     turns change detection on/off. When false, the template falls back to the legacy
#     behavior: always build, and publish only if branch/config says so.
#   - parameter workingDirectory:
#     optional subtree used to scope `git diff` before any build/publish decision is made.
#     This is especially useful in monorepos so unrelated components do not contaminate
#     the change set for the current artifact.
#   - parameter solutionPath:
#     solution used by dotnet-affected. When `workingDirectory` is set in
#     `prepare-dotnet-job.yml`, the solution pattern may be resolved relative to that folder
#     before it reaches this detector.
#   - parameter tagSuffix:
#     optional suffix appended to the compiled/published tags. Examples:
#     - `compiled`
#     - `published`
#     - `compiled-api`
#     - `published-api`
#   - parameter includedPatterns:
#     optional wildcard patterns that replace the default ASP.NET extra include list
#     before any override file is applied.
#   - parameter excludedPatterns:
#     optional wildcard patterns that replace the default ASP.NET extra exclude list
#     before any override file is applied.
#   - parameter publishExtraMode:
#     "aspnet" enables extra publish-only file checks outside the .NET project graph.
#   - parameter includedPatterns:
#     optional wildcard patterns that replace the default ASP.NET extra include list
#     before any override file is applied.
#   - parameter excludedPatterns:
#     optional wildcard patterns that replace the default ASP.NET extra exclude list
#     before any override file is applied.
#
# - Data sources:
#   1. Azure DevOps REST API:
#      finds the latest successful build tagged "compiled" and "published".
#   2. Local git checkout:
#      compares baseline commit -> current commit with `git diff --name-only`,
#      optionally restricted to `workingDirectory`.
#   3. dotnet-affected:
#      translates changed files into affected solution projects.
#   4. Optional consumer file:
#      `.azuredevops/publish-extra-paths.txt` can override ASP.NET publish include/exclude
#      patterns. If `workingDirectory` is set, the detector first looks for the file in
#      `<workingDirectory>/.azuredevops/publish-extra-paths.txt` and falls back to the
#      repo root only if that scoped file does not exist. Sections:
#        [include]
#        [exclude]
#
# - High-level flow:
#   1. Look up compiled/published baselines for the same pipeline + branch.
#   2. If a baseline equals the current commit, skip that side immediately.
#   3. Otherwise compute git changed files for build and publish, constrained to
#      `workingDirectory` when provided.
#   4. Export raw changed-file reports into drop:
#      - changed-files-build.txt
#      - changed-files-deploy.txt
#   5. If semantic evaluation is needed, run dotnet-affected:
#      - affected-build.proj
#      - affected-publish.proj
#   6. For publish:
#      - remove test/example projects
#      - in aspnet mode, also include extra files such as Dockerfile/wwwroot/config
#   7. Export final Azure DevOps variables and log final decisions.
#
# - What counts for build:
#   - Any file returned by `git diff` is considered a candidate change.
#   - Build only becomes false when one of these is true:
#     - there is no compiled baseline match to evaluate and change detection is disabled
#     - current commit equals the compiled baseline commit
#     - `git diff` against the compiled baseline is empty
#     - `dotnet-affected` runs and returns no affected solution projects
#   - There is no explicit path exclusion for build in this template.
#   - Build depends on the solution graph passed in `solutionPath`; if a changed file is
#     outside that solution graph, `dotnet-affected` can still resolve to zero affected
#     projects even though `git diff` found changes.
#
# - What counts for publish:
#   - Publish starts from the same git changes, but then applies stricter filtering.
#   - Publish only becomes true when:
#     - publish is requested by branch/configuration, and
#     - there is no publish skip condition, and
#     - either:
#       - `dotnet-affected` finds at least one publishable affected project, or
#       - in `aspnet` mode, an extra publish path matches the include/exclude rules
#
# - What is excluded from publish:
#   - Projects under `example/` or `examples/`
#   - Test projects matching patterns such as:
#     - `*.Test.*`
#     - `*.Tests.*`
#     - `*Tests.csproj`
#     - `*Tests.fsproj`
#     - `*Tests.vbproj`
#
# - Extra ASP.NET publish rules:
#   - Default include patterns:
#     - `**/Dockerfile`
#     - `**/*.json`
#     - `**/*.xml`
#     - `**/*.config`
#     - `**/*.resx`
#     - `**/wwwroot/**`
#   - Default exclude patterns:
#     - `README*`
#     - `**/README*`
#     - `docs/**`
#     - `.github/**`
#     - `.azuredevops/**`
#     - `azure-pipelines*.yml`
#     - `**/azure-pipelines*.yml`
#     - `**/bin/**`
#     - `**/obj/**`
#   - If `.azuredevops/publish-extra-paths.txt` exists in the consumer repo:
#     - a non-empty `[include]` section replaces the default include list
#     - a non-empty `[exclude]` section replaces the default exclude list
#   - If `includedPatterns` is informed, it replaces the default include list before the
#     override file is evaluated.
#   - If `excludedPatterns` is informed, it replaces the default exclude list before the
#     override file is evaluated.
#
# - Final exported variables:
#   - BuildParameters.HasAffectedBuildProjects
#   - BuildParameters.HasAffectedPublishProjects
#
# - Artifacts written into $(Build.ArtifactStagingDirectory)/drop:
#   - changed-files-build.txt
#   - changed-files-deploy.txt
#   - affected-build.proj
#   - affected-publish.proj
#   If `tagSuffix` is set, the detector appends it to the exported file names:
#   - changed-files-build-api.txt
#   - changed-files-deploy-api.txt
#   - affected-build-api.proj
#   - affected-publish-api.proj
#
# - Fail-open behavior:
#   Any unexpected detection failure keeps the pipeline alive:
#   - build => true
#   - publish => true
#   This avoids blocking CI/CD because the detector itself failed.
