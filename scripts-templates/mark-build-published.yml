parameters:
  - name: tag
    type: string
    default: published
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    inputs:
      pwsh: true
      targetType: inline
      script: |
        Write-Output "##vso[build.addbuildtag]${{ parameters.tag }}";
        Write-Output "##vso[task.setvariable variable=BuildParameters.${{ parameters.tag }}]true";
    displayName: Mark build as ${{ parameters.tag }}
    condition: ${{ parameters.condition }}
