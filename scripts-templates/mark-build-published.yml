parameters:
  - name: tag
    type: string
  - name: tagPrefix
    type: string
    default: ''
  - name: tagSuffix
    type: string
    default: ''
  - name: buildId
    type: string
    default: ''
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'
        function Complete-WithError([string]$Message){Write-Host "##vso[task.logissue type=error]$Message";Write-Host "##vso[task.complete result=Failed;]$Message";exit 0}
        trap {$message=if($null -ne $_.Exception -and -not [string]::IsNullOrWhiteSpace($_.Exception.Message)){$_.Exception.Message}else{[string]$_};Complete-WithError $message}
        $finalTag = "${{ parameters.tag }}"
        if (-not [string]::IsNullOrWhiteSpace("${{ parameters.tagSuffix }}")) {
          $finalTag = "$finalTag-${{ parameters.tagSuffix }}"
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ parameters.tagPrefix }}")) {
          $finalTag = "${{ parameters.tagPrefix }}/$finalTag"
        }

        $targetBuildId = "${{ parameters.buildId }}"
        if ([string]::IsNullOrWhiteSpace($targetBuildId)) {
          Write-Host "##vso[build.addbuildtag]$finalTag";
        } else {
          if ([string]::IsNullOrWhiteSpace($env:SYSTEM_ACCESSTOKEN)) {
            throw "System.AccessToken is not available. Enable OAuth token access for scripts to tag a specific build."
          }
          $encodedTag = [uri]::EscapeDataString($finalTag)
          $uri = "{0}{1}/_apis/build/builds/{2}/tags/{3}?api-version=7.1" -f "$(System.TeamFoundationCollectionUri)", "$(System.TeamProject)", $targetBuildId, $encodedTag
          $headers = @{
            Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN"
            Accept = "application/json; api-version=7.1"
          }
          Write-Host "Tag endpoint: $uri"
          Invoke-RestMethod -Method Put -Uri $uri -Headers $headers | Out-Null
        }
        Write-Host "##vso[task.setvariable variable=BuildParameters.$finalTag]true";
    displayName: Mark as ${{ parameters.tag }}
    condition: ${{ parameters.condition }}
