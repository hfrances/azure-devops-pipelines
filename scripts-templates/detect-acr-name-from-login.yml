parameters:
  - name: taskName
    type: string
    default: ''
  - name: displayName
    type: string
    default: 'Detect ACR from login'
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    ${{ if ne(parameters.taskName, '') }}:
      name: ${{ parameters.taskName }}
    displayName: ${{ parameters.displayName }}
    condition: ${{ parameters.condition }}
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        # Normalize a registry URL/host by removing scheme, path and trailing slashes.
        function Normalize-RegistryUrl([string]$value) {
          $normalized = [string]$value
          if ([string]::IsNullOrWhiteSpace($normalized)) {
            throw 'Registry auth entry is empty.'
          }

          # Trim surrounding whitespace
          $normalized = $normalized.Trim()

          # If a scheme is present (e.g. https://example.com) extract only the host
          if ($normalized -match '^[a-z]+://') {
            $normalized = ([System.Uri]$normalized).Host
          }

          # If a path is present (e.g. example.com/namespace) keep only the host
          if ($normalized.Contains('/')) {
            $normalized = $normalized.Split('/')[0]
          }

          # Remove any trailing slash and return
          return $normalized.TrimEnd('/')
        }

        # Build the path to Docker's config file (from DOCKER_CONFIG env variable)
        $dockerConfigPath = Join-Path $env:DOCKER_CONFIG 'config.json'
        if (-not (Test-Path $dockerConfigPath)) {
          throw "Docker config not found at '$dockerConfigPath'. Run Docker login first."
        }

        # Read and deserialize Docker's config JSON
        $config = Get-Content $dockerConfigPath -Raw | ConvertFrom-Json

        # Pick the first entry under 'auths' (typically the ACR login entry)
        $registryAuth = $config.auths.PSObject.Properties | Select-Object -First 1
        if ($null -eq $registryAuth -or [string]::IsNullOrWhiteSpace([string]$registryAuth.Name)) {
          throw "No registry auth entry found in '$dockerConfigPath'."
        }

        # Normalize the host and derive a short ACR name
        $registryUrl = Normalize-RegistryUrl -value ([string]$registryAuth.Name)
        # If the host contains dots (e.g. myregistry.azurecr.io) take the part before the first dot
        $acrName = if ($registryUrl.Contains('.')) { $registryUrl.Split('.')[0] } else { $registryUrl }

        # Emit information to the step output for easier debugging
        Write-Host "Registry detected (registryUrl): $registryUrl"
        Write-Host "ACR name detected (acrName): $acrName"

        # Publish variables for the rest of the pipeline
        Write-Host "##vso[task.setvariable variable=AcrUrl]$registryUrl"
        Write-Host "##vso[task.setvariable variable=AcrName]$acrName"

# Documentation
# - Purpose:
#   Detect the Azure Container Registry (ACR) login server and derive a short
#   ACR name from Docker's login configuration file produced by a prior
#   `docker login` step.
#
# - Outputs:
#   - `AcrUrl`  : Full registry URL/host (example: myregistry.azurecr.io)
#   - `AcrName` : Short ACR name (example: myregistry)
#
# - Inputs:
#   - parameter `taskName`:
#     optional explicit task `name`.
#   - parameter `displayName`:
#     step display name.
#   - parameter `condition`:
#     execution condition.
#
# - Behavior:
#   - Reads `$env:DOCKER_CONFIG/config.json` and selects the first entry under
#     the `auths` object (commonly the ACR login entry).
#   - Normalizes the registry value by removing scheme, path and trailing
#     slashes, yielding a host like `myregistry.azurecr.io`.
#   - Derives `AcrName` by taking the portion before the first dot when the
#     host contains dots (e.g. `myregistry` from `myregistry.azurecr.io`).
#   - Exposes the two variables via pipeline logging commands so later steps
#     can consume them.
#
# - Requirements:
#   - A prior Docker login must have run and populated
#     `$env:DOCKER_CONFIG/config.json`.
#
# - Notes:
#   - This template intentionally selects the first `auths` entry. If multiple
#     registries are present, prefer logging into the desired registry first.
#   - Error messages are emitted via `throw` to fail the step when the
#     configuration is missing or malformed.
#
# - Formatting note:
#   Keep the script helpers readable and compact. Avoid expanding helper
#   functions into multi-line forms unless debugging requires it.
#
# - Data sources:
#   1. Docker config file: `$env:DOCKER_CONFIG/config.json`.
#
# - High-level flow:
#   1. Build path to Docker config and validate existence.
#   2. Deserialize JSON and pick first `auths` entry.
#   3. Normalize host string and derive `AcrName`.
#   4. Emit `AcrUrl` and `AcrName` as pipeline variables for downstream usage.
