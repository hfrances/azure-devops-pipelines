parameters:
  - name: taskName
    type: string
    default: ''
  - name: displayName
    type: string
    default: 'Detect ACR from login'
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    ${{ if ne(parameters.taskName, '') }}:
      name: ${{ parameters.taskName }}
    displayName: ${{ parameters.displayName }}
    condition: ${{ parameters.condition }}
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        $dockerConfigPath = Join-Path $env:DOCKER_CONFIG 'config.json'
        if (-not (Test-Path $dockerConfigPath)) {
          throw "Docker config not found at '$dockerConfigPath'. Run Docker login first."
        }

        $config = Get-Content $dockerConfigPath -Raw | ConvertFrom-Json
        $registryAuth = $config.auths.PSObject.Properties | Select-Object -First 1
        if ($null -eq $registryAuth -or [string]::IsNullOrWhiteSpace([string]$registryAuth.Name)) {
          throw "No registry auth entry found in '$dockerConfigPath'."
        }

        $registryUrl = [string]$registryAuth.Name
        $acrName = if ($registryUrl.Contains('.')) { $registryUrl.Split('.')[0] } else { $registryUrl }

        Write-Host "Registry detected (registryUrl): $registryUrl"
        Write-Host "ACR name detected (acrName): $acrName"
        Write-Host "##vso[task.setvariable variable=AcrUrl]$registryUrl"
        Write-Host "##vso[task.setvariable variable=AcrName]$acrName"

# Documentation
# - Purpose:
#   Detect the Azure Container Registry login server and ACR short name from the
#   Docker login configuration generated by a previous Docker login step.
# - Outputs:
#   - `AcrUrl`
#   - `AcrName`
# - Inputs:
#   - parameter taskName:
#     optional explicit task `name`.
#   - parameter displayName:
#     step display name.
#   - parameter condition:
#     execution condition.
# - Requirements:
#   - A previous Docker login must have populated `$env:DOCKER_CONFIG/config.json`.
