parameters:
  - name: stageName
    type: string
    default: Stage
  - name: displayName
    type: string
    default: ''
  - name: conditionalStage
    type: string
    default: ''
  - name: conditionalJob
    type: string
    default: ''
  - name: conditionalTask
    type: string
    default: 'SetOutputs'
  - name: conditionalVariable
    type: string
    default: ''
  - name: mappingVariables
    type: object
    default: {}
  - name: additionalVariables
    type: object
    default: []
  - name: dependsOn
    type: object
    default: []
  - name: condition
    type: string
    default: succeeded()
  - name: jobs
    type: jobList
    default: []

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ coalesce(parameters.displayName, parameters.stageName) }}

    variables:
      # 1. Inject direct additional variables (supports variable entries like `- group: ...` or `- name/value`).
      - ${{ each variable in parameters.additionalVariables }}:
        - ${{ each pair in variable }}:
            ${{ pair.key }}: ${{ pair.value }}
      # 2. Dependency resolution (mappingVariables)
      - ${{ if ne(parameters.conditionalStage, '') }}:
        - ${{ each pair in parameters.mappingVariables }}:
          - name: ${{ coalesce(pair.value, pair.key) }}
            value: $[ stageDependencies.${{ parameters.conditionalStage }}.${{ parameters.conditionalJob }}.outputs['${{ parameters.conditionalTask }}.${{ pair.key }}'] ]
      # 3. Parent Summary Variable
      - ${{ if and(ne(parameters.conditionalStage, ''), ne(parameters.conditionalVariable, '')) }}:
        - name: ${{ parameters.conditionalVariable }}
          value: $[ stageDependencies.${{ parameters.conditionalStage }}.${{ parameters.conditionalJob }}.outputs['${{ parameters.conditionalTask }}.${{ parameters.conditionalVariable }}'] ]

    dependsOn:
      - ${{ if ne(parameters.conditionalStage, '') }}:
        - ${{ parameters.conditionalStage }}
      - ${{ each dep in parameters.dependsOn }}:
        - ${{ dep }}

    # Dynamic condition using direct dependency
    ${{ if and(ne(parameters.conditionalStage, ''), ne(parameters.conditionalVariable, '')) }}:
      condition: and(${{ parameters.condition }}, eq(dependencies.${{ parameters.conditionalStage }}.outputs['${{ parameters.conditionalJob }}.${{ parameters.conditionalTask }}.${{ parameters.conditionalVariable }}'], 'true'))
    ${{ if or(eq(parameters.conditionalStage, ''), eq(parameters.conditionalVariable, '')) }}:
      condition: ${{ parameters.condition }}

    # =========================================================
    # Inject the real jobs
    # =========================================================    
    jobs: ${{ parameters.jobs }}
