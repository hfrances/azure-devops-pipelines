parameters:
  - name: workingDirectory
    type: string
    default: '$(Build.SourcesDirectory)'
  - name: solutionPattern
    type: string
    default: '$(BuildParameters.Solution)'
  - name: forceVersion
    type: string
    default: '$(ForceVersion)'
  - name: condition
    type: string
    default: succeeded()

steps:
  - task: PowerShell@2
    inputs:
      pwsh: true
      targetType: 'inline'
      script: |
        $taskHasIssues = $false;
        function mark-task-issue([string]$message) {
          write-warning $message;
          $script:taskHasIssues = $true;
        }

        $solutionPath = "${{ parameters.solutionPattern }}";
        $versionOriginal = "$(MainProject.Version)";
        $version = "$(BuildParameters.ReleaseVersion)";
        $assemblyVersion = "$(BuildParameters.ReleaseAssemblyVersion)";
        $versionForce = "${{ parameters.forceVersion }}"

        if ($version) {
          $solution = (Get-Item $solutionPath);
          $projectPaths = @();

          if ($solution.Extension -ieq '.sln') {
            $solutionContent = (Get-Content $solution);
            $pattern = '(?m)Project\(.*\)\s?=\s?"(?<ProjectName>.*)",\s?"(?<ProjectPath>.*)",\s?.*"';
            $projects = $solutionContent | Select-String $pattern -AllMatches;
            $projectPaths = @($projects.Matches | ForEach-Object { $_.Groups['ProjectPath'].Value });
          }
          elseif ($solution.Extension -ieq '.slnx') {
            [xml]$solutionXml = Get-Content $solution -Raw;
            $projectPaths = @($solutionXml.SelectNodes('//Project[@Path]') | ForEach-Object { $_.Attributes['Path'].Value });
          }
          else {
            write-error "Unsupported solution extension: $($solution.Extension).";
            exit 1;
          }

          if ($projectPaths.Count -eq 0) {
            mark-task-issue "No projects found in solution '$($solution.FullName)'.";
          }
          else {
            foreach ($projectPath in $projectPaths) {
              $projectFile = Join-Path $solution.Directory $projectPath;

              if (Test-Path $projectFile -PathType Leaf) {
                $file = (Get-Item $projectFile);
                $xml = [Xml] (Get-Content $file.FullName);
                
                # Iterar sobre cada PropertyGroup y actualizar Version y AssemblyVersion si existen (solo debería encontrar uno, pero es por si hay varios PropertyGroups)
                foreach ($propertyGroup in $xml.Project.PropertyGroup) {
                  if ($propertyGroup.Version) {
                    $xmlVersion = $propertyGroup.Version;
                    $xmlAssemblyVersion = $propertyGroup.AssemblyVersion;
                    
                    if (($true -eq $versionForce) -or ($xmlVersion -eq $versionOriginal)) {
                      Write-Host "Processing file: $($file.FullName)"
                      if ($xmlVersion) {
                        $propertyGroup.Version = $version;
                        Write-Host "Update to version: $version";
                      }
                      if ($xmlAssemblyVersion) {
                        $propertyGroup.AssemblyVersion = $assemblyVersion;
                        Write-Host "Update to assembly version: $assemblyVersion";
                      }
                      $xml.Save($file.FullName); 
                      Write-Host '';
                    }
                  }
                }
              } 
              else {
                write-warning "Project file does not exist: $projectFile"
                Write-Host '';
              }
            }
          }
        }
        else {
          write-warning "No version.";
        }

        if ($taskHasIssues) {
          Write-Host "##vso[task.complete result=SucceededWithIssues;]Apply release version completed with warnings.";
        }
      workingDirectory: '${{ parameters.workingDirectory }}'
    displayName: 'Apply release version to all projects'
    condition: ${{ parameters.condition }}
